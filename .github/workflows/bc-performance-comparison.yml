name: BC Performance Comparison (Linux vs Windows)

on:
  workflow_dispatch:
    inputs:
      run_type:
        description: 'What to measure'
        required: true
        default: 'compile-only'
        type: choice
        options:
          - compile-only
          - full-pipeline
      compile_target:
        description: 'What to compile'
        required: false
        default: 'bcapps-system-app'
        type: choice
        options:
          - bcapps-system-app
          - sample-extension
      bc_version:
        description: 'BC version for NuGet symbols (e.g. 27.5.46862.48004)'
        required: false
        default: '27.5.46862.48004'
        type: string
      description:
        description: 'Run description (optional, shown in summary)'
        required: false
        type: string

env:
  BC_VERSION: ${{ inputs.bc_version || '27.5.46862.48004' }}
  # Platform (System) symbols have an independent version track.
  # 26.0.38176 is the platform version that ships with BC app 27.5.46862.48004.
  PLATFORM_VERSION: '27.0.46760'
  BC_SYMBOLS_BASE_URL: 'https://dynamicssmb2.pkgs.visualstudio.com/571e802d-b44b-45fc-bd41-4cfddec73b44/_packaging/b656b10c-3de0-440c-900c-bc2e4e86d84c/nuget/v3/flat2'
  # Latest stable AL tools as of 2025-11 (works on both Linux and Windows).
  AL_TOOLS_VERSION: '16.2.28.57946'
  BCDEV_REPO: 'https://github.com/StefanMaron/BCDevOnLinux.git'
  BCDEV_BRANCH: 'v2'
  # BCApps branch that targets platform 26.0.0.0 (matches our platform symbols)
  BCAPPS_BRANCH: 'releases/26.0'
  # BC artifact CDN base URL — used to download test toolkit .app files from the platform artifact
  BC_ARTIFACT_BASE: 'https://bcartifacts-exdbf9fwegejdqak.b02.azurefd.net/sandbox'

# ============================================================================
# LINUX COMPILE JOB
# ============================================================================
jobs:
  linux-compile:
    runs-on: ubuntu-latest
    name: Linux - Compile
    outputs:
      setup_duration: ${{ steps.record.outputs.setup_duration }}
      download_duration: ${{ steps.record.outputs.download_duration }}
      clone_duration: ${{ steps.record.outputs.clone_duration }}
      dotnet_dl_duration: ${{ steps.record.outputs.dotnet_dl_duration }}
      compile_duration: ${{ steps.record.outputs.compile_duration }}
      total_duration: ${{ steps.record.outputs.total_duration }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Record start time
      run: echo "START_EPOCH=$(date +%s.%N)" >> $GITHUB_ENV

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install AL Linux tools
      run: |
        STEP_START=$(date +%s.%N)

        dotnet tool install -g Microsoft.Dynamics.BusinessCentral.Development.Tools.Linux \
          --version ${{ env.AL_TOOLS_VERSION }}
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

        STEP_END=$(date +%s.%N)
        SETUP_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")
        echo "SETUP_DURATION=$SETUP_DURATION" >> $GITHUB_ENV
        echo "AL tools install took: $SETUP_DURATION seconds"

    - name: Verify AL tools
      run: |
        AL --version || true
        echo "AL tools path: $(which AL)"

    - name: Download BC symbol packages
      run: |
        STEP_START=$(date +%s.%N)

        mkdir -p temp_packages .alpackages

        download_pkg() {
          local name=$1 url=$2 out=$3
          echo "Downloading $name..."
          if curl -f -L -s --retry 3 -o "$out" "$url"; then
            echo "  OK: $(du -sh "$out" | cut -f1)"
          else
            echo "  WARNING: failed to download $name (HTTP error or network issue)"
          fi
        }

        BASE="${{ env.BC_SYMBOLS_BASE_URL }}"
        VER="${{ env.BC_VERSION }}"
        PVER="${{ env.PLATFORM_VERSION }}"

        # System Application only needs platform symbols, but download all for full-pipeline use
        download_pkg "Platform" \
          "$BASE/microsoft.platform.symbols/$PVER/microsoft.platform.symbols.$PVER.nupkg" \
          "temp_packages/platform.nupkg"
        download_pkg "SystemApplication" \
          "$BASE/microsoft.systemapplication.us.symbols.63ca2fa4-4f03-4f2b-a480-172fef340d3f/$VER/microsoft.systemapplication.us.symbols.63ca2fa4-4f03-4f2b-a480-172fef340d3f.$VER.nupkg" \
          "temp_packages/systemapp.nupkg"
        download_pkg "BaseApplication" \
          "$BASE/microsoft.baseapplication.us.symbols.437dbf0e-84ff-417a-965d-ed2bb9650972/$VER/microsoft.baseapplication.us.symbols.437dbf0e-84ff-417a-965d-ed2bb9650972.$VER.nupkg" \
          "temp_packages/baseapp.nupkg"
        download_pkg "Application" \
          "$BASE/microsoft.application.us.symbols/$VER/microsoft.application.us.symbols.$VER.nupkg" \
          "temp_packages/app.nupkg"
        download_pkg "BusinessFoundation" \
          "$BASE/microsoft.businessfoundation.us.symbols.f3552374-a1f2-4356-848e-196002525837/$VER/microsoft.businessfoundation.us.symbols.f3552374-a1f2-4356-848e-196002525837.$VER.nupkg" \
          "temp_packages/bizfoundation.nupkg"

        for pkg in temp_packages/*.nupkg; do
          [ -s "$pkg" ] || { echo "Skipping empty/missing: $pkg"; continue; }
          dir="temp_packages/$(basename "$pkg" .nupkg)"
          mkdir -p "$dir"
          unzip -q "$pkg" -d "$dir" 2>/dev/null || echo "Warning: extraction issue for $pkg"
        done
        find temp_packages -name "*.app" -exec cp {} .alpackages/ \;
        rm -rf temp_packages

        APP_COUNT=$(ls .alpackages/*.app 2>/dev/null | wc -l)
        echo "Symbol .app files in .alpackages: $APP_COUNT"
        ls -la .alpackages/

        if [ "$APP_COUNT" -eq 0 ]; then
          echo "ERROR: No symbol .app files were extracted - compilation will fail."
          exit 1
        fi

        STEP_END=$(date +%s.%N)
        DOWNLOAD_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")
        echo "DOWNLOAD_DURATION=$DOWNLOAD_DURATION" >> $GITHUB_ENV
        echo "Download + extract took: $DOWNLOAD_DURATION seconds"

    - name: Clone BCApps System Application
      if: inputs.compile_target == 'bcapps-system-app' || inputs.compile_target == ''
      run: |
        STEP_START=$(date +%s.%N)

        echo "Cloning microsoft/BCApps branch ${{ env.BCAPPS_BRANCH }} (depth 1)..."
        git clone \
          --depth 1 \
          --branch ${{ env.BCAPPS_BRANCH }} \
          --single-branch \
          https://github.com/microsoft/BCApps \
          bcapps-temp

        AL_COUNT=$(find bcapps-temp/src/System\ Application/App -name "*.al" | wc -l)
        echo "AL source files found: $AL_COUNT"

        STEP_END=$(date +%s.%N)
        CLONE_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")
        echo "CLONE_DURATION=$CLONE_DURATION" >> $GITHUB_ENV
        echo "Clone took: $CLONE_DURATION seconds"

    - name: Setup BC compiler folder (dotnet packages)
      if: inputs.compile_target == 'bcapps-system-app' || inputs.compile_target == ''
      shell: pwsh
      run: |
        $start = Get-Date
        Install-Module -Name BcContainerHelper -Force -AllowClobber -Scope CurrentUser | Out-Null
        Import-Module BcContainerHelper -Force -DisableNameChecking

        # 1. Resolve the w1 artifact URL (fast - just an HTTP lookup)
        $w1Url = Get-BCArtifactUrl -type Sandbox -version "26" -country w1 -select Latest
        if (-not $w1Url) { throw "Get-BCArtifactUrl returned empty" }
        Write-Host "W1 URL: $w1Url"

        # 2. Derive the platform artifact URL (same path, 'w1' -> 'platform')
        $platformUrl = $w1Url -replace '/w1$', '/platform'
        Write-Host "Platform URL: $platformUrl"

        # 3. HEAD request to get artifact size (needed for range calculations)
        $head = Invoke-WebRequest -Uri $platformUrl -Method Head -UseBasicParsing
        $totalSize = [long]($head.Headers['Content-Length'] | Select-Object -First 1)
        Write-Host "Platform artifact size: $([math]::Round($totalSize / 1MB)) MB"

        # 4. Download service DLLs, test toolkit symbols, and mock assemblies in ONE pass.
        # Single EOCD parse + single HTTP range request for all three categories.
        $dllsBase = Join-Path $env:RUNNER_TEMP "dlls"
        $servicePath = Join-Path $dllsBase "Service"
        $ttAppsPath = Join-Path $env:GITHUB_WORKSPACE "test-toolkit-apps"
        $mockPath = Join-Path $env:GITHUB_WORKSPACE "mock-assemblies"
        New-Item -ItemType Directory -Path $servicePath -Force | Out-Null
        New-Item -ItemType Directory -Path $ttAppsPath -Force | Out-Null
        New-Item -ItemType Directory -Path $mockPath -Force | Out-Null
        $scriptPath = Join-Path $env:GITHUB_WORKSPACE "scripts" "download-dotnetpackages.py"
        Write-Host "Running combined range download (service-dlls + test-toolkit + mock-assemblies): $scriptPath"
        $result = & python3 $scriptPath $platformUrl $totalSize $servicePath service-dlls $ttAppsPath test-toolkit $mockPath mock-assemblies 2>&1
        $result | ForEach-Object { Write-Host $_ }
        if ($LASTEXITCODE -ne 0) {
          Write-Host "ERROR: Range download failed (exit $LASTEXITCODE)"
          exit 1
        }

        # 5. Remove subdirectories that BcContainerHelper removes
        @('Management', 'WindowsServiceInstaller', 'SideServices') | ForEach-Object {
          $sub = Join-Path $servicePath $_
          if (Test-Path $sub) { Remove-Item $sub -Recurse -Force; Write-Host "  Removed: $_" }
        }

        # 6. Copy DocumentFormat.OpenXml.dll to OpenXML folder (same as BcContainerHelper)
        $openXmlPath = Join-Path $dllsBase "OpenXML"
        New-Item -ItemType Directory -Path $openXmlPath -Force | Out-Null
        $openXmlDll = Get-ChildItem $servicePath -Filter "DocumentFormat.OpenXml.dll" -Recurse -EA SilentlyContinue | Select-Object -First 1
        if ($openXmlDll) {
          Copy-Item $openXmlDll.FullName $openXmlPath -Force
          Write-Host "OpenXML: $($openXmlDll.Name)"
        }

        # 7. Build probing paths: OpenXML, .NET ref assemblies, Service
        # Runtime .NET assemblies cause Mono.Cecil circular type forwarding → stack overflow.
        # SDK reference assemblies (ref pack) are compilation-only facades with type
        # definitions but no forwarding chains — safe for Mono.Cecil resolution.
        $probingPaths = @()
        if (Test-Path $openXmlPath) { $probingPaths += $openXmlPath }

        # Find .NET SDK reference assemblies (ref pack)
        $refPackBase = "/usr/share/dotnet/packs/Microsoft.NETCore.App.Ref"
        $refPack = Get-ChildItem $refPackBase -Directory -EA SilentlyContinue |
          Where-Object { $_.Name -match "^8\." } | Sort-Object Name -Descending | Select-Object -First 1
        if ($refPack) {
          $refPath = Join-Path $refPack.FullName "ref/net8.0"
          if (Test-Path $refPath) {
            $probingPaths += $refPath
            $refCount = (Get-ChildItem $refPath -Filter "*.dll" -EA SilentlyContinue).Count
            Write-Host "Ref pack: $refPath ($refCount DLLs)"
          }
        } else { Write-Host "WARNING: No .NET 8 ref pack found at $refPackBase" }

        if (Test-Path $servicePath) { $probingPaths += $servicePath }
        if (Test-Path $mockPath) { $probingPaths += $mockPath }

        $serviceCount = (Get-ChildItem $servicePath -Filter "*.dll" -Recurse -EA SilentlyContinue).Count
        $mockCount = (Get-ChildItem $mockPath -Filter "*.dll" -Recurse -EA SilentlyContinue).Count
        Write-Host "Service DLLs (with subdirs): $serviceCount"
        Write-Host "Mock assemblies: $mockCount"

        # Copy test toolkit .app files to .alpackages for symbol resolution
        $ttApps = Get-ChildItem $ttAppsPath -Filter "*.app" -EA SilentlyContinue
        $alPkgPath = Join-Path $env:GITHUB_WORKSPACE ".alpackages"
        if ($ttApps) {
          $ttApps | ForEach-Object { Copy-Item $_.FullName $alPkgPath -Force }
          Write-Host "Test toolkit symbols ($($ttApps.Count) apps) added to .alpackages"
        }

        if ($probingPaths.Count -gt 0) {
          $combined = $probingPaths -join ','
          Write-Host "assemblyProbingPaths ($($probingPaths.Count) paths): $combined"
          echo "DOTNET_PATH=$combined" >> $env:GITHUB_ENV
        } else {
          Write-Host "ERROR: No probing paths found"
          exit 1
        }

        $dur = [math]::Round(($(Get-Date) - $start).TotalSeconds, 3)
        echo "DOTNET_DL_DURATION=$dur" >> $env:GITHUB_ENV
        Write-Host "Compiler folder setup took: $dur seconds"

    - name: Compile AL extension
      env:
        # Disable ReadyToRun to avoid issues with cross-platform pre-compiled assemblies
        DOTNET_ReadyToRun: '0'
        COMPlus_ReadyToRun: '0'
      run: |
        STEP_START=$(date +%s.%N)
        SYMBOLS_PATH="$(pwd)/.alpackages"

        if [ "${{ inputs.compile_target }}" = "bcapps-system-app" ] || [ -z "${{ inputs.compile_target }}" ]; then
          PROJECT_PATH="bcapps-temp/src/System Application/App"
          echo "Compiling: BCApps System Application"
        else
          PROJECT_PATH="."
          echo "Compiling: sample extension"
        fi

        # Fix Windows backslash path separators in resource references for Linux.
        # AL compiler on Linux doesn't convert \ to / in ControlAddin resource paths.
        # Replace ALL backslashes within single-quoted path strings in .al files.
        find "$PROJECT_PATH" -name "*.al" -exec grep -li 'controladdin\|ControlAddIn' {} + | while IFS= read -r f; do sed -i 's|\\|/|g' "$f"; done
        FIXED=$(find "$PROJECT_PATH" -name "*.al" -newer "$PROJECT_PATH/app.json" 2>/dev/null | wc -l)
        echo "Fixed backslash paths in $FIXED .al files"

        EXTRA_ARGS=""
        if [ -n "$DOTNET_PATH" ]; then
          EXTRA_ARGS="/assemblyProbingPaths:$DOTNET_PATH"
        fi
        echo "Running: AL compile /project:\"$PROJECT_PATH\" /packagecachepath:\"$SYMBOLS_PATH\" $EXTRA_ARGS"
        echo "Probing paths: $DOTNET_PATH"
        IFS=',' read -ra PATHS <<< "$DOTNET_PATH"
        for p in "${PATHS[@]}"; do
          count=$(find "$p" -name "*.dll" 2>/dev/null | wc -l)
          echo "  $p: $count DLLs"
        done
        # Capture full output including stderr to diagnose crashes (exit 134 = unhandled .NET exception)
        set +e
        AL compile /project:"$PROJECT_PATH" /packagecachepath:"$SYMBOLS_PATH" $EXTRA_ARGS 2>&1
        AL_EXIT=$?
        set -e

        STEP_END=$(date +%s.%N)
        COMPILE_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")
        echo "COMPILE_DURATION=$COMPILE_DURATION" >> $GITHUB_ENV
        echo "Compilation took: $COMPILE_DURATION seconds"

        if [ $AL_EXIT -ne 0 ]; then
          echo "ERROR: AL compiler exited with code $AL_EXIT"
          exit $AL_EXIT
        fi

        echo "Compiled app files:"
        find "$PROJECT_PATH" -maxdepth 1 -name "*.app" -exec ls -la {} \; 2>/dev/null || true
        find . -maxdepth 1 -name "*.app" -exec ls -la {} \; 2>/dev/null || true

        # Copy output .app to root for artifact upload
        find "$PROJECT_PATH" -maxdepth 1 -name "*.app" -exec cp {} . \; 2>/dev/null || true

    - name: Compile System Application Test
      if: inputs.compile_target == 'bcapps-system-app' || inputs.compile_target == ''
      env:
        DOTNET_ReadyToRun: '0'
        COMPlus_ReadyToRun: '0'
      run: |
        STEP_START=$(date +%s.%N)

        # Copy compiled System Application .app to .alpackages for symbol resolution
        find bcapps-temp/src/System\ Application/App -maxdepth 1 -name "*.app" -exec cp {} .alpackages/ \;
        echo "System Application .app copied to .alpackages"

        PROJECT_PATH="bcapps-temp/src/System Application/Test"
        SYMBOLS_PATH="$(pwd)/.alpackages"

        # Fix Windows backslash path separators
        find "$PROJECT_PATH" -name "*.al" -exec grep -li 'controladdin\|ControlAddIn' {} + | while IFS= read -r f; do sed -i 's|\\|/|g' "$f"; done

        EXTRA_ARGS=""
        if [ -n "$DOTNET_PATH" ]; then
          EXTRA_ARGS="/assemblyProbingPaths:$DOTNET_PATH"
        fi

        echo "Compiling: BCApps System Application Test"
        set +e
        AL compile /project:"$PROJECT_PATH" /packagecachepath:"$SYMBOLS_PATH" $EXTRA_ARGS 2>&1
        AL_EXIT=$?
        set -e

        STEP_END=$(date +%s.%N)
        TEST_COMPILE_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")
        echo "TEST_COMPILE_DURATION=$TEST_COMPILE_DURATION" >> $GITHUB_ENV
        echo "System Application Test compilation took: $TEST_COMPILE_DURATION seconds"

        if [ $AL_EXIT -ne 0 ]; then
          echo "ERROR: System Application Test compilation failed with code $AL_EXIT"
          exit $AL_EXIT
        fi

        echo "Compiled test app files:"
        find "$PROJECT_PATH" -maxdepth 1 -name "*.app" -exec ls -la {} \;
        find "$PROJECT_PATH" -maxdepth 1 -name "*.app" -exec cp {} . \;

    - name: Record metrics
      id: record
      run: |
        END_EPOCH=$(date +%s.%N)
        TOTAL=$(python3 -c "print(f'{$END_EPOCH - $START_EPOCH:.3f}')")
        echo "total_duration=$TOTAL"                      >> $GITHUB_OUTPUT
        echo "setup_duration=$SETUP_DURATION"             >> $GITHUB_OUTPUT
        echo "download_duration=$DOWNLOAD_DURATION"       >> $GITHUB_OUTPUT
        echo "clone_duration=${CLONE_DURATION:-0}"        >> $GITHUB_OUTPUT
        echo "dotnet_dl_duration=${DOTNET_DL_DURATION:-0}" >> $GITHUB_OUTPUT
        echo "compile_duration=$COMPILE_DURATION"         >> $GITHUB_OUTPUT

        COMPILE_TARGET="${{ inputs.compile_target }}"
        [ -z "$COMPILE_TARGET" ] && COMPILE_TARGET="bcapps-system-app"

        printf '{
          "platform": "linux",
          "runner": "ubuntu-latest",
          "pipeline_type": "compile-only",
          "compile_target": "%s",
          "total_duration": %s,
          "setup_duration": %s,
          "download_duration": %s,
          "clone_duration": %s,
          "dotnet_dl_duration": %s,
          "compile_duration": %s,
          "timestamp": "%s",
          "github_run_id": "%s",
          "al_tools_version": "${{ env.AL_TOOLS_VERSION }}",
          "bc_version": "${{ env.BC_VERSION }}"
        }\n' \
          "$COMPILE_TARGET" \
          "$TOTAL" "${SETUP_DURATION:-0}" "${DOWNLOAD_DURATION:-0}" \
          "${CLONE_DURATION:-0}" "${DOTNET_DL_DURATION:-0}" "${COMPILE_DURATION:-0}" \
          "$(date -Iseconds)" "$GITHUB_RUN_ID" \
          > linux-compile-metrics.json
        echo "Metrics saved to linux-compile-metrics.json"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-compile-artifacts
        path: |
          *.app
          linux-compile-metrics.json
        retention-days: 30

# ============================================================================
# WINDOWS COMPILE JOB
# ============================================================================
  windows-compile:
    if: false  # Disabled — focusing on Linux headless
    runs-on: windows-2022
    name: Windows - Compile
    outputs:
      setup_duration: ${{ steps.record.outputs.setup_duration }}
      download_duration: ${{ steps.record.outputs.download_duration }}
      clone_duration: ${{ steps.record.outputs.clone_duration }}
      dotnet_dl_duration: ${{ steps.record.outputs.dotnet_dl_duration }}
      compile_duration: ${{ steps.record.outputs.compile_duration }}
      total_duration: ${{ steps.record.outputs.total_duration }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Record start time
      shell: powershell
      run: |
        $t = Get-Date
        echo "BUILD_START_TIME=$($t.ToString('yyyy-MM-ddTHH:mm:ss.fffZ'))" >> $env:GITHUB_ENV

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install AL tools and BcContainerHelper
      shell: powershell
      run: |
        $start = Get-Date

        dotnet tool install -g Microsoft.Dynamics.BusinessCentral.Development.Tools `
          --version ${{ env.AL_TOOLS_VERSION }}

        Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope CurrentUser | Out-Null
        Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
        Install-Module -Name BcContainerHelper -Force -AllowClobber -Scope CurrentUser
        Import-Module BcContainerHelper -Force -DisableNameChecking

        $dur = [math]::Round(($(Get-Date) - $start).TotalSeconds, 3)
        echo "SETUP_DURATION=$dur" >> $env:GITHUB_ENV
        Write-Host "Setup took: $dur seconds"

        # AL --version exits with code 1 by design; suppress it explicitly
        $ErrorActionPreference = "Continue"
        AL --version 2>&1 | Write-Host
        exit 0

    - name: Download BC symbol packages
      shell: powershell
      run: |
        $start = Get-Date
        $b = "${{ env.BC_SYMBOLS_BASE_URL }}"
        $v = "${{ env.BC_VERSION }}"
        $p = "${{ env.PLATFORM_VERSION }}"

        New-Item -ItemType Directory -Path temp_packages, .alpackages -Force | Out-Null

        function dl($name, $url, $out) {
          Write-Host "Downloading $name..."
          try {
            Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing -EA Stop
            Write-Host "  OK: $([math]::Round((Get-Item $out).Length/1MB,2)) MB"
          } catch { Write-Host "  WARNING: $name - $($_.Exception.Message)" }
        }

        dl "platform" "$b/microsoft.platform.symbols/$p/microsoft.platform.symbols.$p.nupkg" "temp_packages\platform.nupkg"
        $id1 = "63ca2fa4-4f03-4f2b-a480-172fef340d3f"
        dl "systemapp" "$b/microsoft.systemapplication.us.symbols.$id1/$v/microsoft.systemapplication.us.symbols.$id1.$v.nupkg" "temp_packages\systemapp.nupkg"
        $id2 = "437dbf0e-84ff-417a-965d-ed2bb9650972"
        dl "baseapp" "$b/microsoft.baseapplication.us.symbols.$id2/$v/microsoft.baseapplication.us.symbols.$id2.$v.nupkg" "temp_packages\baseapp.nupkg"
        dl "app" "$b/microsoft.application.us.symbols/$v/microsoft.application.us.symbols.$v.nupkg" "temp_packages\app.nupkg"
        $id3 = "f3552374-a1f2-4356-848e-196002525837"
        dl "bizfoundation" "$b/microsoft.businessfoundation.us.symbols.$id3/$v/microsoft.businessfoundation.us.symbols.$id3.$v.nupkg" "temp_packages\bizfoundation.nupkg"

        Get-ChildItem temp_packages -Filter "*.nupkg" | Where-Object { $_.Length -gt 0 } | ForEach-Object {
          Write-Host "Extracting $($_.Name)..."
          $dir = "temp_packages\$($_.BaseName)"
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          $zip = $_.FullName -replace '\.nupkg$', '.zip'
          Copy-Item $_.FullName $zip
          try { Expand-Archive -Path $zip -DestinationPath $dir -Force } catch { Write-Host "  Extract warning: $_" }
          Remove-Item $zip -EA SilentlyContinue
        }
        $appFiles = Get-ChildItem -Path temp_packages -Filter "*.app" -Recurse
        $appFiles | ForEach-Object {
          Copy-Item $_.FullName ".alpackages\" -Force
          Write-Host "  Copied: $($_.Name)"
        }
        Remove-Item -Recurse -Force temp_packages -EA SilentlyContinue

        $appCount = (Get-ChildItem .alpackages -Filter "*.app").Count
        Write-Host "Symbol .app files in .alpackages: $appCount"
        Get-ChildItem .alpackages

        if ($appCount -eq 0) {
          Write-Host "ERROR: No symbol .app files were extracted - compilation will fail."
          exit 1
        }

        $dur = [math]::Round(($(Get-Date) - $start).TotalSeconds, 3)
        echo "DOWNLOAD_DURATION=$dur" >> $env:GITHUB_ENV
        Write-Host "Download + extract took: $dur seconds"

    - name: Clone BCApps System Application
      if: inputs.compile_target == 'bcapps-system-app' || inputs.compile_target == ''
      shell: powershell
      run: |
        $start = Get-Date
        $branch = "${{ env.BCAPPS_BRANCH }}"

        Write-Host "Cloning microsoft/BCApps branch $branch (depth 1)..."
        git clone --depth 1 --branch $branch --single-branch https://github.com/microsoft/BCApps bcapps-temp

        $alCount = (Get-ChildItem "bcapps-temp\src\System Application\App" -Filter "*.al" -Recurse).Count
        Write-Host "AL source files found: $alCount"

        $dur = [math]::Round(($(Get-Date) - $start).TotalSeconds, 3)
        echo "CLONE_DURATION=$dur" >> $env:GITHUB_ENV
        Write-Host "Clone took: $dur seconds"

    - name: Setup BC compiler folder (dotnet packages)
      if: inputs.compile_target == 'bcapps-system-app' || inputs.compile_target == ''
      shell: powershell
      run: |
        Import-Module BcContainerHelper -Force -DisableNameChecking
        $start = Get-Date

        # 1. Resolve the w1 artifact URL (fast - just an HTTP lookup)
        $w1Url = Get-BCArtifactUrl -type Sandbox -version "26" -country w1 -select Latest
        if (-not $w1Url) { throw "Get-BCArtifactUrl returned empty" }
        Write-Host "W1 URL: $w1Url"

        # 2. Derive the platform artifact URL (same path, 'w1' -> 'platform')
        $platformUrl = $w1Url -replace '/w1$', '/platform'
        Write-Host "Platform URL: $platformUrl"

        # 3. HEAD request to get artifact size (needed for range calculations)
        $head = Invoke-WebRequest -Uri $platformUrl -Method Head -UseBasicParsing
        $totalSize = [long]($head.Headers['Content-Length'] | Select-Object -First 1)
        Write-Host "Platform artifact size: $([math]::Round($totalSize / 1MB)) MB"

        # 4. Download service DLLs via HTTP range request, preserving directory structure.
        # Replicates BcContainerHelper's New-BcCompilerFolder behavior.
        # Note: Join-Path with 3 args requires PS7+; use nested calls for PS5.1 compatibility
        $dllsBase = Join-Path $env:RUNNER_TEMP "dlls"
        $servicePath = Join-Path $dllsBase "Service"
        New-Item -ItemType Directory -Path $servicePath -Force | Out-Null
        $scriptPath = Join-Path (Join-Path $env:GITHUB_WORKSPACE "scripts") "download-dotnetpackages.py"
        Write-Host "Running range download (service-dlls mode, preserving tree): $scriptPath"
        $result = & python3 $scriptPath $platformUrl $totalSize $servicePath service-dlls 2>&1
        $result | ForEach-Object { Write-Host $_ }
        if ($LASTEXITCODE -ne 0) {
          Write-Host "ERROR: Range download failed (exit $LASTEXITCODE)"
          exit 1
        }

        # 5. Remove subdirectories that BcContainerHelper removes
        @('Management', 'WindowsServiceInstaller', 'SideServices') | ForEach-Object {
          $sub = Join-Path $servicePath $_
          if (Test-Path $sub) { Remove-Item $sub -Recurse -Force; Write-Host "  Removed: $_" }
        }

        # 6. Copy DocumentFormat.OpenXml.dll to OpenXML folder
        $openXmlPath = Join-Path $dllsBase "OpenXML"
        New-Item -ItemType Directory -Path $openXmlPath -Force | Out-Null
        $openXmlDll = Get-ChildItem $servicePath -Filter "DocumentFormat.OpenXml.dll" -Recurse -EA SilentlyContinue | Select-Object -First 1
        if ($openXmlDll) {
          Copy-Item $openXmlDll.FullName $openXmlPath -Force
          Write-Host "OpenXML: $($openXmlDll.Name)"
        }

        # 7. Build probing paths like BcContainerHelper for Windows + platform v22+:
        #    OpenXML, .NET runtime paths, Service — comma-separated
        $probingPaths = @()
        if (Test-Path $openXmlPath) { $probingPaths += $openXmlPath }

        # Add .NET runtime paths (Windows can use these safely)
        try {
          $runtimes = & dotnet --list-runtimes 2>&1
          $netCoreRuntime = $runtimes | Where-Object { $_ -match "Microsoft\.NETCore\.App ([0-9]+)\." } |
            Where-Object { [int]$Matches[1] -lt 9 } | Select-Object -Last 1
          if ($netCoreRuntime -match "Microsoft\.NETCore\.App ([0-9.]+) \[(.+)\]") {
            $p = Join-Path $Matches[2].Trim('[',']') $Matches[1]
            if (Test-Path $p) { $probingPaths += $p; Write-Host "NETCore.App: $p" }
          }
          $aspRuntime = $runtimes | Where-Object { $_ -match "Microsoft\.AspNetCore\.App ([0-9]+)\." } |
            Where-Object { [int]$Matches[1] -lt 9 } | Select-Object -Last 1
          if ($aspRuntime -match "Microsoft\.AspNetCore\.App ([0-9.]+) \[(.+)\]") {
            $p = Join-Path $Matches[2].Trim('[',']') $Matches[1]
            if (Test-Path $p) { $probingPaths += $p; Write-Host "AspNetCore.App: $p" }
          }
        } catch { Write-Host "Could not enumerate .NET runtimes: $_" }

        if (Test-Path $servicePath) { $probingPaths += $servicePath }

        $serviceCount = (Get-ChildItem $servicePath -Filter "*.dll" -Recurse -EA SilentlyContinue).Count
        Write-Host "Service DLLs (with subdirs): $serviceCount"

        if ($probingPaths.Count -gt 0) {
          $combined = $probingPaths -join ','
          Write-Host "assemblyProbingPaths ($($probingPaths.Count) paths): $combined"
          echo "DOTNET_PATH=$combined" >> $env:GITHUB_ENV
        } else {
          Write-Host "ERROR: No probing paths found"
          exit 1
        }

        $dur = [math]::Round(($(Get-Date) - $start).TotalSeconds, 3)
        echo "DOTNET_DL_DURATION=$dur" >> $env:GITHUB_ENV
        Write-Host "Compiler folder setup took: $dur seconds"

    - name: Download test toolkit symbols for test app compilation
      if: inputs.compile_target == 'bcapps-system-app' || inputs.compile_target == ''
      shell: powershell
      run: |
        Import-Module BcContainerHelper -Force -DisableNameChecking
        $artifactUrl = Get-BCArtifactUrl -type Sandbox -version "26" -country w1 -select Latest
        $platformUrl = $artifactUrl -replace '/w1$', '/platform'
        $head = Invoke-WebRequest -Uri $platformUrl -Method Head -UseBasicParsing
        $totalSize = [long]($head.Headers['Content-Length'] | Select-Object -First 1)

        New-Item -ItemType Directory -Path test-toolkit-apps, mock-assemblies -Force | Out-Null
        $scriptPath = Join-Path (Join-Path $env:GITHUB_WORKSPACE "scripts") "download-dotnetpackages.py"
        & python3 $scriptPath $platformUrl $totalSize test-toolkit-apps test-toolkit
        & python3 $scriptPath $platformUrl $totalSize mock-assemblies mock-assemblies

        Get-ChildItem test-toolkit-apps -Filter "*.app" | ForEach-Object {
          Copy-Item $_.FullName ".alpackages\" -Force
          Write-Host "  Copied to .alpackages: $($_.Name)"
        }

        # Add mock assemblies to assembly probing paths
        $mockPath = Join-Path $PWD "mock-assemblies"
        if ($env:DOTNET_PATH) {
          echo "DOTNET_PATH=$env:DOTNET_PATH,$mockPath" >> $env:GITHUB_ENV
        } else {
          echo "DOTNET_PATH=$mockPath" >> $env:GITHUB_ENV
        }
        Write-Host "Mock assemblies: $(Get-ChildItem $mockPath -Filter '*.dll' | Measure-Object | Select-Object -ExpandProperty Count) DLLs"

    - name: Compile AL extension
      shell: powershell
      run: |
        $start = Get-Date
        $symbolsPath = "$PWD\.alpackages"
        $target = "${{ inputs.compile_target }}"
        if ([string]::IsNullOrEmpty($target)) { $target = "bcapps-system-app" }

        if ($target -eq "bcapps-system-app") {
          $projectPath = "bcapps-temp\src\System Application\App"
          Write-Host "Compiling: BCApps System Application"
        } else {
          $projectPath = "."
          Write-Host "Compiling: sample extension"
        }

        $alExe = "AL"
        Write-Host "Using NuGet AL compiler"

        $compileArgs = @("compile", "/project:$projectPath", "/packagecachepath:$symbolsPath")
        if ($env:DOTNET_PATH) {
          $compileArgs += "/assemblyProbingPaths:$env:DOTNET_PATH"
          Write-Host "assemblyProbingPaths: $env:DOTNET_PATH"
        }

        $ErrorActionPreference = "Continue"
        & $alExe @compileArgs
        $alExit = $LASTEXITCODE
        $ErrorActionPreference = "Stop"

        $dur = [math]::Round(($(Get-Date) - $start).TotalSeconds, 3)
        echo "COMPILE_DURATION=$dur" >> $env:GITHUB_ENV
        Write-Host "Compilation took: $dur seconds"

        if ($alExit -ne 0) {
          Write-Host "ERROR: AL compiler exited with code $alExit"
          exit $alExit
        }

        Write-Host "Compilation successful"
        Write-Host "Compiled app files:"
        Get-ChildItem $projectPath -Filter "*.app" -EA SilentlyContinue | ForEach-Object {
          Write-Host "  $($_.Name) ($([math]::Round($_.Length / 1KB, 1)) KB)"
          if ($projectPath -ne ".") { Copy-Item $_.FullName "." -Force }
        }

    - name: Compile System Application Test
      if: inputs.compile_target == 'bcapps-system-app' || inputs.compile_target == ''
      shell: powershell
      run: |
        $start = Get-Date
        $symbolsPath = "$PWD\.alpackages"

        # Copy compiled System Application .app to .alpackages for symbol resolution
        Get-ChildItem "bcapps-temp\src\System Application\App" -Filter "*.app" | ForEach-Object {
          Copy-Item $_.FullName ".alpackages\" -Force
          Write-Host "System App .app copied to .alpackages: $($_.Name)"
        }

        $projectPath = "bcapps-temp\src\System Application\Test"
        Write-Host "Compiling: BCApps System Application Test"

        $compileArgs = @("compile", "/project:$projectPath", "/packagecachepath:$symbolsPath")
        if ($env:DOTNET_PATH) {
          $compileArgs += "/assemblyProbingPaths:$env:DOTNET_PATH"
        }

        $ErrorActionPreference = "Continue"
        & AL @compileArgs
        $alExit = $LASTEXITCODE
        $ErrorActionPreference = "Stop"

        $dur = [math]::Round(($(Get-Date) - $start).TotalSeconds, 3)
        echo "TEST_COMPILE_DURATION=$dur" >> $env:GITHUB_ENV
        Write-Host "System Application Test compilation took: $dur seconds"

        if ($alExit -ne 0) {
          Write-Host "ERROR: System Application Test compilation failed with code $alExit"
          exit $alExit
        }

        Write-Host "Compiled test app files:"
        Get-ChildItem $projectPath -Filter "*.app" | ForEach-Object {
          Write-Host "  $($_.Name) ($([math]::Round($_.Length / 1KB, 1)) KB)"
          Copy-Item $_.FullName "." -Force
        }

    - name: Record metrics
      id: record
      shell: powershell
      run: |
        $endTime   = Get-Date
        $startTime = [DateTime]::Parse($env:BUILD_START_TIME)
        $total     = [math]::Round(($endTime - $startTime).TotalSeconds, 3)

        $target = "${{ inputs.compile_target }}"
        if ([string]::IsNullOrEmpty($target)) { $target = "bcapps-system-app" }

        echo "total_duration=$total"                          >> $env:GITHUB_OUTPUT
        echo "setup_duration=$env:SETUP_DURATION"            >> $env:GITHUB_OUTPUT
        echo "download_duration=$env:DOWNLOAD_DURATION"      >> $env:GITHUB_OUTPUT
        echo "clone_duration=$env:CLONE_DURATION"            >> $env:GITHUB_OUTPUT
        echo "dotnet_dl_duration=$env:DOTNET_DL_DURATION"    >> $env:GITHUB_OUTPUT
        echo "compile_duration=$env:COMPILE_DURATION"        >> $env:GITHUB_OUTPUT

        @{
          platform          = "windows"
          runner            = "windows-2022"
          pipeline_type     = "compile-only"
          compile_target    = $target
          total_duration    = $total
          setup_duration    = [double]$env:SETUP_DURATION
          download_duration = [double]$env:DOWNLOAD_DURATION
          clone_duration    = if ($env:CLONE_DURATION) { [double]$env:CLONE_DURATION } else { 0.0 }
          dotnet_dl_duration = if ($env:DOTNET_DL_DURATION) { [double]$env:DOTNET_DL_DURATION } else { 0.0 }
          compile_duration  = [double]$env:COMPILE_DURATION
          timestamp         = $endTime.ToString('yyyy-MM-ddTHH:mm:ss.fffZ')
          github_run_id     = $env:GITHUB_RUN_ID
          al_tools_version  = "${{ env.AL_TOOLS_VERSION }}"
          bc_version        = "${{ env.BC_VERSION }}"
        } | ConvertTo-Json | Out-File -FilePath "windows-compile-metrics.json" -Encoding UTF8
        Write-Host "Metrics saved to windows-compile-metrics.json"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-compile-artifacts
        path: |
          *.app
          windows-compile-metrics.json
        retention-days: 30

# ============================================================================
# LINUX FULL PIPELINE JOB  (compile + BCDevOnLinux container + tests)
# ============================================================================
  linux-full:
    runs-on: ubuntu-latest
    name: Linux - Full Pipeline (Headless)
    if: inputs.run_type == 'full-pipeline'
    timeout-minutes: 30
    outputs:
      total_duration: ${{ steps.record.outputs.total_duration }}
      compile_duration: ${{ steps.record.outputs.compile_duration }}
      container_duration: ${{ steps.record.outputs.container_duration }}
      test_duration: ${{ steps.record.outputs.test_duration }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Record start time
      run: echo "START_EPOCH=$(date +%s.%N)" >> $GITHUB_ENV

    - name: Setup .NET and AL tools
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Clone and build alDirectCompile
      run: |
        STEP_START=$(date +%s.%N)
        git clone --depth 1 https://github.com/StefanMaron/alDirectCompile.git aldirectcompile
        cd aldirectcompile/StartupHook
        dotnet publish -c Release -o bin/Release/net8.0/publish
        # The MSBuild CopySqlClient target already copies the net8.0 unix build.
        # Verify it's the right one (must NOT reference System.Data.Common v9.0).
        strings bin/Release/net8.0/publish/Microsoft.Data.SqlClient.dll | grep -q "9.0.0.0" && {
          echo "ERROR: SqlClient references .NET 9 — using explicit net8.0 build"
          cp ~/.nuget/packages/microsoft.data.sqlclient/6.0.5/runtimes/unix/lib/net8.0/Microsoft.Data.SqlClient.dll bin/Release/net8.0/publish/
        } || echo "SqlClient net8.0 build OK"
        cd ../..
        STEP_END=$(date +%s.%N)
        echo "SETUP_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Download BC artifacts (on host)
      run: |
        STEP_START=$(date +%s.%N)
        BC_URL="${{ env.BC_ARTIFACT_BASE }}/${{ env.BC_VERSION }}/w1"
        PLATFORM_URL="${{ env.BC_ARTIFACT_BASE }}/${{ env.BC_VERSION }}/platform"
        DEST="$(pwd)/bc-artifacts"
        mkdir -p "$DEST/app" "$DEST/platform"

        echo "Downloading app: $BC_URL"
        curl -sSL "$BC_URL" -o "$DEST/bc-app.zip"
        unzip -qo "$DEST/bc-app.zip" -d "$DEST/app"
        rm -f "$DEST/bc-app.zip"

        echo "Downloading platform: $PLATFORM_URL"
        curl -sSL "$PLATFORM_URL" -o "$DEST/bc-platform.zip"
        unzip -qo "$DEST/bc-platform.zip" 'ServiceTier/*' 'ModernDev/*' -d "$DEST/platform" 2>/dev/null || \
          unzip -qo "$DEST/bc-platform.zip" -d "$DEST/platform"
        rm -f "$DEST/bc-platform.zip"

        echo "Artifacts: $(du -sh "$DEST" | cut -f1)"
        STEP_END=$(date +%s.%N)
        echo "DOWNLOAD_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Start BC service tier
      run: |
        STEP_START=$(date +%s.%N)
        cd aldirectcompile

        # Pre-downloaded artifacts are at ../bc-artifacts
        # Copy them into the Docker volume after containers start
        ARTIFACTS_PATH="$(cd .. && pwd)/bc-artifacts"
        printf "BC_ARTIFACT_URL=skip\nSA_PASSWORD=Passw0rd123!\n" > .env

        docker compose build --no-cache bc

        # Verify Docker image contents before starting
        echo "=== Docker image verification ==="
        docker compose run --rm --no-deps --entrypoint "" bc sh -c \
          'echo "Hook dir:" && ls -la /bc/hook/*.dll /bc/hook/*.so 2>/dev/null && echo "---" && echo "Entrypoint:" && head -10 /bc/scripts/entrypoint.sh'

        docker compose up -d

        # Copy pre-downloaded artifacts into the container
        echo "Copying artifacts into container..."
        docker compose exec bc mkdir -p /bc/artifacts/app /bc/artifacts/platform
        docker compose cp "$ARTIFACTS_PATH/app/." bc:/bc/artifacts/app/
        docker compose cp "$ARTIFACTS_PATH/platform/." bc:/bc/artifacts/platform/
        echo "Artifacts copied."

        echo "Waiting for BC (DB restore + compilation)..."
        for i in $(seq 1 120); do
          docker compose logs bc 2>&1 | grep -q "Press Enter" && { echo "BC ready after $((i*5))s"; break; }
          if [ $((i % 6)) -eq 0 ]; then
            LAST=$(docker compose logs bc 2>&1 | grep "\[entrypoint\]\|\[StartupHook\]\|Exception\|ERROR" | tail -3)
            echo "  $((i*5))s: $LAST"
          fi
          if ! docker compose ps bc 2>/dev/null | grep -q "Up"; then
            echo "ERROR: BC container died — full logs:"
            docker compose logs bc 2>&1
            exit 1
          fi
          sleep 5
        done
        if ! docker compose logs bc 2>&1 | grep -q "Press Enter"; then
          echo "ERROR: BC did not start — full logs:"
          docker compose logs bc 2>&1
          exit 1
        fi
        INSTANCE=$(docker compose exec bc grep -oP 'ServerInstance" value="\K[^"]+' /bc/service/CustomSettings.config 2>/dev/null || echo "InstanceName")
        echo "INSTANCE=$INSTANCE" >> $GITHUB_ENV
        cd ..
        STEP_END=$(date +%s.%N)
        CONTAINER_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")
        echo "CONTAINER_DURATION=$CONTAINER_DURATION" >> $GITHUB_ENV

    - name: Install AL tools and get symbols
      run: |
        STEP_START=$(date +%s.%N)
        dotnet tool install -g Microsoft.Dynamics.BusinessCentral.Development.Tools.Linux \
          --version ${{ env.AL_TOOLS_VERSION }} || true
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
        mkdir -p .alpackages
        # Copy System.app from platform and all extension .app files (Application, Base App, etc.) as symbols
        docker run --rm -v aldirectcompile_bc-artifacts:/data -v $(pwd)/.alpackages:/out alpine \
          sh -c 'cp "$(find /data/platform/ModernDev -name System.app 2>/dev/null | head -1)" /out/System.app && find /data/app/Extensions -name "*.app" -exec cp {} /out/ \;'
        echo "Symbols: $(ls .alpackages/*.app | wc -l) .app files"
        STEP_END=$(date +%s.%N)
        echo "DOWNLOAD_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Compile AL extension
      env:
        DOTNET_ReadyToRun: '0'
        COMPlus_ReadyToRun: '0'
      run: |
        STEP_START=$(date +%s.%N)
        # Remove cloned repos so AL compiler doesn't pick up their .al files
        rm -rf aldirectcompile bcapps-temp
        AL compile /project:. /packagecachepath:.alpackages
        echo "Compiled: $(ls -la *.app 2>/dev/null)"
        STEP_END=$(date +%s.%N)
        COMPILE_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")
        echo "COMPILE_DURATION=$COMPILE_DURATION" >> $GITHUB_ENV

    - name: Publish extension to BC
      run: |
        APP_FILE=$(find . -maxdepth 1 -name "*.app" | head -1)
        curl -s -o /dev/null -w "Publish: HTTP %{http_code}\n" --max-time 30 \
          -u "BCRUNNER:Admin123!" -X POST \
          -F "file=@$APP_FILE;type=application/octet-stream" \
          "http://localhost:7049/$INSTANCE/dev/apps?SchemaUpdateMode=synchronize"

    - name: Run AL tests via OData
      run: |
        STEP_START=$(date +%s.%N)
        COMPANY_ID=$(curl -s --max-time 10 -u "BCRUNNER:Admin123!" \
          "http://localhost:7048/$INSTANCE/ODataV4/Company" | \
          python3 -c "import sys,json; print(json.load(sys.stdin)['value'][0]['Id'])")
        API="http://localhost:7052/$INSTANCE/api/custom/automation/v1.0/companies($COMPANY_ID)"

        RID=$(curl -s --max-time 10 -u "BCRUNNER:Admin123!" -X POST \
          -H "Content-Type: application/json" -d '{"CodeunitId": 50002}' \
          "$API/codeunitRunRequests" | python3 -c "import sys,json; print(json.load(sys.stdin)['Id'])")

        curl -s --max-time 120 -u "BCRUNNER:Admin123!" -X POST \
          -H "Content-Type: application/json" \
          "$API/codeunitRunRequests($RID)/Microsoft.NAV.runCodeunit" > /dev/null

        STATUS=$(curl -s --max-time 10 -u "BCRUNNER:Admin123!" \
          "$API/codeunitRunRequests($RID)" | \
          python3 -c "import sys,json;d=json.load(sys.stdin);print(d['Status'])")
        echo "Test status: $STATUS"

        curl -s --max-time 10 -u "BCRUNNER:Admin123!" "$API/logEntries" | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        p=f=0
        for e in data['value']:
            if e['functionName']:
                if e['success']: p+=1; print(f'  ✓ {e[\"codeunitName\"]}::{e[\"functionName\"]}')
                else: f+=1; print(f'  ✗ {e[\"codeunitName\"]}::{e[\"functionName\"]}')
        print(f'\nPassed: {p}, Failed: {f}')
        if f>0: exit(1)
        "
        STEP_END=$(date +%s.%N)
        TEST_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")
        echo "TEST_DURATION=$TEST_DURATION" >> $GITHUB_ENV

    - name: Record metrics
      id: record
      if: always()
      run: |
        END_EPOCH=$(date +%s.%N)
        TOTAL=$(python3 -c "print(f'{$END_EPOCH - $START_EPOCH:.3f}')")
        echo "total_duration=$TOTAL"                     >> $GITHUB_OUTPUT
        echo "compile_duration=${COMPILE_DURATION:-0}"   >> $GITHUB_OUTPUT
        echo "container_duration=${CONTAINER_DURATION:-0}" >> $GITHUB_OUTPUT
        echo "test_duration=${TEST_DURATION:-0}"         >> $GITHUB_OUTPUT

        echo ""
        echo "============================================"
        echo "  Linux Headless Pipeline - Timing Summary"
        echo "============================================"
        echo "  Setup + build:     ${SETUP_DURATION:-?}s"
        echo "  Container start:   ${CONTAINER_DURATION:-?}s"
        echo "  Symbols download:  ${DOWNLOAD_DURATION:-?}s"
        echo "  Compile extension: ${COMPILE_DURATION:-?}s"
        echo "  Run tests:         ${TEST_DURATION:-?}s"
        echo "  TOTAL:             ${TOTAL}s"
        echo "============================================"

        printf '{"platform":"linux-headless","total_duration":%s,"setup_duration":%s,"container_duration":%s,"download_duration":%s,"compile_duration":%s,"test_duration":%s,"timestamp":"%s","bc_version":"%s"}\n' \
          "$TOTAL" "${SETUP_DURATION:-0}" "${CONTAINER_DURATION:-0}" \
          "${DOWNLOAD_DURATION:-0}" "${COMPILE_DURATION:-0}" "${TEST_DURATION:-0}" \
          "$(date -Iseconds)" "${{ env.BC_VERSION }}" \
          > linux-full-metrics.json

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: linux-full-artifacts
        path: |
          *.app
          linux-full-metrics.json
        retention-days: 30

# WINDOWS FULL PIPELINE JOB  (compile + BcContainerHelper + tests)
# ============================================================================
  windows-full:
    if: false  # Disabled — focusing on Linux headless
    runs-on: windows-latest
    name: Windows - Full Pipeline
    timeout-minutes: 90
    outputs:
      total_duration: ${{ steps.record.outputs.total_duration }}
      compile_duration: ${{ steps.record.outputs.compile_duration }}
      container_duration: ${{ steps.record.outputs.container_duration }}
      test_duration: ${{ steps.record.outputs.test_duration }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Record start time
      shell: powershell
      run: |
        $t = Get-Date
        echo "BUILD_START_TIME=$($t.ToString('yyyy-MM-ddTHH:mm:ss.fffZ'))" >> $env:GITHUB_ENV

    - name: Setup tools (BcContainerHelper + AL compiler)
      shell: powershell
      run: |
        $start = Get-Date
        Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force
        Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
        Install-Module -Name BcContainerHelper -Force -AllowClobber
        Import-Module BcContainerHelper -Force -DisableNameChecking

        dotnet tool install -g Microsoft.Dynamics.BusinessCentral.Development.Tools `
          --version ${{ env.AL_TOOLS_VERSION }}

        $dur = [math]::Round(($(Get-Date) - $start).TotalSeconds, 3)
        echo "SETUP_DURATION=$dur" >> $env:GITHUB_ENV
        Write-Host "Setup took: $dur seconds"
        exit 0

    - name: Download BC symbol packages
      shell: powershell
      run: |
        $start = Get-Date
        $base = "${{ env.BC_SYMBOLS_BASE_URL }}"
        $ver  = "${{ env.BC_VERSION }}"
        $pver = "${{ env.PLATFORM_VERSION }}"

        New-Item -ItemType Directory -Path temp_packages, .alpackages -Force | Out-Null

        $packages = @{
          "platform"      = "$base/microsoft.platform.symbols/$pver/microsoft.platform.symbols.$pver.nupkg"
          "systemapp"     = "$base/microsoft.systemapplication.us.symbols.63ca2fa4-4f03-4f2b-a480-172fef340d3f/$ver/microsoft.systemapplication.us.symbols.63ca2fa4-4f03-4f2b-a480-172fef340d3f.$ver.nupkg"
          "baseapp"       = "$base/microsoft.baseapplication.us.symbols.437dbf0e-84ff-417a-965d-ed2bb9650972/$ver/microsoft.baseapplication.us.symbols.437dbf0e-84ff-417a-965d-ed2bb9650972.$ver.nupkg"
          "app"           = "$base/microsoft.application.us.symbols/$ver/microsoft.application.us.symbols.$ver.nupkg"
          "bizfoundation" = "$base/microsoft.businessfoundation.us.symbols.f3552374-a1f2-4356-848e-196002525837/$ver/microsoft.businessfoundation.us.symbols.f3552374-a1f2-4356-848e-196002525837.$ver.nupkg"
        }
        foreach ($name in $packages.Keys) {
          try { Invoke-WebRequest -Uri $packages[$name] -OutFile "temp_packages\$name.nupkg" -UseBasicParsing -EA Stop }
          catch { Write-Host "Warning: failed to download $name" }
        }

        Get-ChildItem temp_packages -Filter "*.nupkg" | Where-Object { $_.Length -gt 0 } | ForEach-Object {
          $dir = "temp_packages\$($_.BaseName)"
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          $zip = $_.FullName -replace '\.nupkg$', '.zip'
          Copy-Item $_.FullName $zip
          try { Expand-Archive -Path $zip -DestinationPath $dir -Force } catch {}
          Remove-Item $zip -EA SilentlyContinue
        }
        Get-ChildItem -Path temp_packages -Filter "*.app" -Recurse | ForEach-Object {
          Copy-Item $_.FullName ".alpackages\" -Force
        }
        Remove-Item -Recurse -Force temp_packages -EA SilentlyContinue

        $dur = [math]::Round(($(Get-Date) - $start).TotalSeconds, 3)
        echo "DOWNLOAD_DURATION=$dur" >> $env:GITHUB_ENV
        Write-Host "Download took: $dur seconds"

    - name: Clone BCApps System Application
      if: inputs.compile_target == 'bcapps-system-app'
      shell: powershell
      run: |
        $start = Get-Date
        $branch = "${{ env.BCAPPS_BRANCH }}"
        Write-Host "Cloning microsoft/BCApps branch $branch (depth 1)..."
        git clone --depth 1 --branch $branch --single-branch https://github.com/microsoft/BCApps bcapps-temp
        $alCount = (Get-ChildItem "bcapps-temp\src\System Application\App" -Filter "*.al" -Recurse).Count
        $testCount = (Get-ChildItem "bcapps-temp\src\System Application\Test" -Filter "*.al" -Recurse).Count
        Write-Host "System Application AL files: $alCount"
        Write-Host "System Application Test AL files: $testCount"
        $dur = [math]::Round(($(Get-Date) - $start).TotalSeconds, 3)
        echo "CLONE_DURATION=$dur" >> $env:GITHUB_ENV
        Write-Host "Clone took: $dur seconds"

    - name: Setup BC compiler folder (dotnet packages)
      if: inputs.compile_target == 'bcapps-system-app'
      shell: powershell
      run: |
        Import-Module BcContainerHelper -Force -DisableNameChecking
        $start = Get-Date

        $w1Url = Get-BCArtifactUrl -type Sandbox -version "26" -country w1 -select Latest
        if (-not $w1Url) { throw "Get-BCArtifactUrl returned empty" }
        $platformUrl = $w1Url -replace '/w1$', '/platform'
        $head = Invoke-WebRequest -Uri $platformUrl -Method Head -UseBasicParsing
        $totalSize = [long]($head.Headers['Content-Length'] | Select-Object -First 1)

        $dllsBase = Join-Path $env:RUNNER_TEMP "dlls"
        $servicePath = Join-Path $dllsBase "Service"
        New-Item -ItemType Directory -Path $servicePath -Force | Out-Null
        $scriptPath = Join-Path (Join-Path $env:GITHUB_WORKSPACE "scripts") "download-dotnetpackages.py"
        & python3 $scriptPath $platformUrl $totalSize $servicePath service-dlls
        if ($LASTEXITCODE -ne 0) { exit 1 }

        # Download mock assemblies (MockTest.dll etc. needed for System Application Test)
        $mockPath = Join-Path $PWD "mock-assemblies"
        New-Item -ItemType Directory -Path $mockPath -Force | Out-Null
        & python3 $scriptPath $platformUrl $totalSize $mockPath mock-assemblies
        Write-Host "Mock assemblies: $((Get-ChildItem $mockPath -Filter '*.dll' -EA SilentlyContinue).Count) DLLs"

        @('Management', 'WindowsServiceInstaller', 'SideServices') | ForEach-Object {
          $sub = Join-Path $servicePath $_
          if (Test-Path $sub) { Remove-Item $sub -Recurse -Force; Write-Host "  Removed: $_" }
        }

        $openXmlPath = Join-Path $dllsBase "OpenXML"
        New-Item -ItemType Directory -Path $openXmlPath -Force | Out-Null
        $openXmlDll = Get-ChildItem $servicePath -Filter "DocumentFormat.OpenXml.dll" -Recurse -EA SilentlyContinue | Select-Object -First 1
        if ($openXmlDll) { Copy-Item $openXmlDll.FullName $openXmlPath -Force }

        $probingPaths = @()
        if (Test-Path $openXmlPath) { $probingPaths += $openXmlPath }
        try {
          $runtimes = & dotnet --list-runtimes 2>&1
          $netCoreRuntime = $runtimes | Where-Object { $_ -match "Microsoft\.NETCore\.App ([0-9]+)\." } |
            Where-Object { [int]$Matches[1] -lt 9 } | Select-Object -Last 1
          if ($netCoreRuntime -match "Microsoft\.NETCore\.App ([0-9.]+) \[(.+)\]") {
            $p = Join-Path $Matches[2].Trim('[',']') $Matches[1]
            if (Test-Path $p) { $probingPaths += $p }
          }
        } catch {}
        if (Test-Path $servicePath) { $probingPaths += $servicePath }
        if (Test-Path $mockPath) { $probingPaths += $mockPath }

        if ($probingPaths.Count -gt 0) {
          $combined = $probingPaths -join ','
          echo "DOTNET_PATH=$combined" >> $env:GITHUB_ENV
          Write-Host "assemblyProbingPaths: $combined"
        }

        $dur = [math]::Round(($(Get-Date) - $start).TotalSeconds, 3)
        echo "DOTNET_DL_DURATION=$dur" >> $env:GITHUB_ENV
        Write-Host "Compiler folder setup took: $dur seconds"

    - name: Download test toolkit apps from BC artifact
      shell: powershell
      run: |
        $start = Get-Date
        $artifactUrl = Get-BCArtifactUrl -type Sandbox -version "26" -country w1 -select Latest
        Write-Host "Artifact URL: $artifactUrl"

        # Download artifact to local cache (BcContainerHelper caches in C:\bcartifacts.cache)
        $paths = Download-Artifacts -artifactUrl $artifactUrl -includePlatform
        Write-Host "Downloaded paths: $($paths -join ', ')"

        # Find the platform folder (contains 'platform' in the path)
        $platformFolder = $null
        foreach ($p in $paths) {
          if ($p -and (Test-Path $p) -and ($p -like '*platform*' -or (Test-Path (Join-Path $p "Applications")))) {
            $platformFolder = $p
            break
          }
        }
        # Fallback: check bcartifacts.cache directly
        if (-not $platformFolder) {
          $cacheBase = "C:\bcartifacts.cache\sandbox"
          if (Test-Path $cacheBase) {
            $platformFolder = Get-ChildItem $cacheBase -Directory -Recurse |
              Where-Object { $_.Name -eq "platform" -or (Test-Path (Join-Path $_.FullName "Applications")) } |
              Select-Object -First 1 -ExpandProperty FullName
          }
        }
        if (-not $platformFolder -or -not (Test-Path $platformFolder)) {
          Write-Host "WARNING: Could not locate platform folder, listing downloaded paths:"
          foreach ($p in $paths) { if ($p) { Write-Host "  $p"; if (Test-Path $p) { Get-ChildItem $p | ForEach-Object { Write-Host "    $($_.Name)" } } } }
          Write-Host "Continuing without test toolkit apps for compilation symbols"
          $dur = [math]::Round(($(Get-Date) - $start).TotalSeconds, 3)
          echo "TOOLKIT_DOWNLOAD_DURATION=$dur" >> $env:GITHUB_ENV
          exit 0
        }
        Write-Host "Platform folder: $platformFolder"

        # Collect test toolkit .app files
        New-Item -ItemType Directory -Path test-toolkit-apps -Force | Out-Null
        $appDir = Join-Path $platformFolder "Applications"
        if (-not (Test-Path $appDir)) { $appDir = $platformFolder }

        $testFrameworkPath = Join-Path $appDir "testframework"
        if (Test-Path $testFrameworkPath) {
          Get-ChildItem -Path $testFrameworkPath -Filter "*.app" -Recurse | ForEach-Object {
            Copy-Item $_.FullName "test-toolkit-apps\" -Force
            Write-Host "  Found: $($_.Name)"
          }
        }
        # System Application Test Library, Tests-TestLibraries, etc.
        Get-ChildItem -Path $appDir -Directory -ErrorAction SilentlyContinue | ForEach-Object {
          $testDir = Join-Path $_.FullName "Test"
          if (Test-Path $testDir) {
            Get-ChildItem -Path $testDir -Filter "*.app" | ForEach-Object {
              Copy-Item $_.FullName "test-toolkit-apps\" -Force
              Write-Host "  Found: $($_.Name)"
            }
          }
        }

        $count = (Get-ChildItem test-toolkit-apps -Filter "*.app" -ErrorAction SilentlyContinue).Count
        Write-Host "Total test toolkit apps: $count"

        # Copy to .alpackages for compilation symbol resolution
        Get-ChildItem test-toolkit-apps -Filter "*.app" -ErrorAction SilentlyContinue | ForEach-Object {
          Copy-Item $_.FullName ".alpackages\" -Force
        }

        $dur = [math]::Round(($(Get-Date) - $start).TotalSeconds, 3)
        echo "TOOLKIT_DOWNLOAD_DURATION=$dur" >> $env:GITHUB_ENV
        Write-Host "Test toolkit download took: $dur seconds"

    - name: Compile AL extension
      shell: powershell
      run: |
        $start = Get-Date
        $symbolsPath = "$PWD\.alpackages"
        $target = "${{ inputs.compile_target }}"

        if ($target -eq "bcapps-system-app") {
          $projectPath = "bcapps-temp\src\System Application\App"
          Write-Host "Compiling: BCApps System Application"
          $compileArgs = @("compile", "/project:$projectPath", "/packagecachepath:$symbolsPath")
          if ($env:DOTNET_PATH) {
            $compileArgs += "/assemblyProbingPaths:$env:DOTNET_PATH"
          }
        } else {
          Write-Host "Compiling: sample extension"
          $compileArgs = @("compile", "/project:.", "/packagecachepath:$symbolsPath")
        }

        $ErrorActionPreference = "Continue"
        & AL @compileArgs
        $alExit = $LASTEXITCODE
        $ErrorActionPreference = "Stop"

        $dur = [math]::Round(($(Get-Date) - $start).TotalSeconds, 3)
        echo "COMPILE_DURATION=$dur" >> $env:GITHUB_ENV
        Write-Host "Compilation took: $dur seconds"

        if ($alExit -ne 0) { exit $alExit }

        if ($target -eq "bcapps-system-app") {
          Get-ChildItem $projectPath -Filter "*.app" | ForEach-Object {
            Write-Host "  $($_.Name) ($([math]::Round($_.Length / 1KB, 1)) KB)"
            Copy-Item $_.FullName "." -Force
          }
        }

    - name: Compile System Application Test
      if: inputs.compile_target == 'bcapps-system-app'
      shell: powershell
      run: |
        $start = Get-Date
        $symbolsPath = "$PWD\.alpackages"

        # Copy compiled System Application .app to .alpackages for symbol resolution
        Get-ChildItem "bcapps-temp\src\System Application\App" -Filter "*.app" | ForEach-Object {
          Copy-Item $_.FullName ".alpackages\" -Force
          Write-Host "System App .app copied to .alpackages: $($_.Name)"
        }

        $projectPath = "bcapps-temp\src\System Application\Test"
        Write-Host "Compiling: BCApps System Application Test"

        $compileArgs = @("compile", "/project:$projectPath", "/packagecachepath:$symbolsPath")
        if ($env:DOTNET_PATH) {
          $compileArgs += "/assemblyProbingPaths:$env:DOTNET_PATH"
        }

        $ErrorActionPreference = "Continue"
        & AL @compileArgs
        $alExit = $LASTEXITCODE
        $ErrorActionPreference = "Stop"

        $dur = [math]::Round(($(Get-Date) - $start).TotalSeconds, 3)
        echo "TEST_COMPILE_DURATION=$dur" >> $env:GITHUB_ENV
        Write-Host "System Application Test compilation took: $dur seconds"

        if ($alExit -ne 0) { exit $alExit }

        # Extract extension ID for test execution
        $testAppJson = Get-Content "$projectPath\app.json" | ConvertFrom-Json
        echo "SYSAPP_TEST_ID=$($testAppJson.id)" >> $env:GITHUB_ENV
        Write-Host "System Application Test extension ID: $($testAppJson.id)"

        Get-ChildItem $projectPath -Filter "*.app" | ForEach-Object {
          Write-Host "  $($_.Name) ($([math]::Round($_.Length / 1KB, 1)) KB)"
          Copy-Item $_.FullName "." -Force
        }

    - name: Create BC container via BcContainerHelper
      shell: powershell
      run: |
        $start = Get-Date
        $artifactUrl = Get-BCArtifactUrl -type Sandbox -version "26" -country w1 -select Latest
        Write-Host "Artifact URL: $artifactUrl"

        $cred = New-Object pscredential 'admin', (ConvertTo-SecureString 'Admin123!' -AsPlainText -Force)
        New-BcContainer -containerName bcserver `
          -artifactUrl $artifactUrl `
          -credential $cred `
          -accept_eula `
          -auth UserPassword `
          -multitenant:$false `
          -includeTestToolkit `
          -includeTestLibrariesOnly `
          -assignPremiumPlan `
          -memoryLimit 8G `
          -isolation process `
          -updateHosts

        $dur = [math]::Round(($(Get-Date) - $start).TotalSeconds, 3)
        echo "CONTAINER_DURATION=$dur" >> $env:GITHUB_ENV
        Write-Host "Container creation took: $dur seconds"

    - name: Publish app and run tests
      shell: powershell
      run: |
        $cred = New-Object pscredential 'admin', (ConvertTo-SecureString 'Admin123!' -AsPlainText -Force)
        $target = "${{ inputs.compile_target }}"

        $pubStart = Get-Date

        if ($target -eq "bcapps-system-app") {
          # Publish System Application (compiled from source)
          $sysAppFile = Get-ChildItem "bcapps-temp\src\System Application\App" -Filter "*.app" | Select-Object -First 1
          if (-not $sysAppFile) { $sysAppFile = Get-ChildItem "." -Filter "*System*Application*.app" | Where-Object { $_.Name -notlike "*Test*" } | Select-Object -First 1 }
          if ($sysAppFile) {
            Write-Host "Publishing System Application: $($sysAppFile.Name)"
            Publish-BcContainerApp -containerName bcserver -appFile $sysAppFile.FullName `
              -skipVerification -sync -install -scope Tenant
          } else {
            Write-Host "WARNING: System Application .app not found"
          }

          # Publish System Application Test (compiled from source)
          $testAppFile = Get-ChildItem "bcapps-temp\src\System Application\Test" -Filter "*.app" | Select-Object -First 1
          if (-not $testAppFile) { $testAppFile = Get-ChildItem "." -Filter "*System*Application*Test*.app" | Select-Object -First 1 }
          if ($testAppFile) {
            Write-Host "Publishing System Application Test: $($testAppFile.Name)"
            Publish-BcContainerApp -containerName bcserver -appFile $testAppFile.FullName `
              -skipVerification -sync -install -scope Tenant
          } else {
            throw "System Application Test .app not found"
          }
        } else {
          # Publish sample extension
          $appFile = Get-ChildItem "*.app" | Select-Object -First 1
          if (-not $appFile) { throw "No .app file found" }
          Write-Host "Publishing: $($appFile.Name)"
          Publish-BcContainerApp -containerName bcserver -appFile $appFile.FullName `
            -skipVerification -sync -install
        }

        $pubDur = [math]::Round(($(Get-Date) - $pubStart).TotalSeconds, 3)
        echo "PUBLISH_DURATION=$pubDur" >> $env:GITHUB_ENV

        $testStart = Get-Date

        if ($target -eq "bcapps-system-app") {
          # Run System Application Tests
          $testExtId = $env:SYSAPP_TEST_ID
          Write-Host "Running System Application Tests (extension ID: $testExtId)..."
          $result = Run-TestsInBcContainer -containerName bcserver `
            -extensionId $testExtId `
            -credential $cred `
            -GitHubActions "warning" `
            -detailed
        } else {
          # Run sample extension tests
          $appJson = Get-Content "app.json" | ConvertFrom-Json
          $result = Run-TestsInBcContainer -containerName bcserver `
            -extensionId $appJson.id `
            -credential $cred `
            -GitHubActions "warning" `
            -detailed
        }

        $testDur = [math]::Round(($(Get-Date) - $testStart).TotalSeconds, 3)
        echo "TEST_DURATION=$testDur" >> $env:GITHUB_ENV

        Write-Host "Tests: $($result.PassedTests) passed, $($result.FailedTests) failed"
        if ($result.FailedTests -gt 0) { exit 1 }

    - name: Record metrics
      id: record
      shell: powershell
      run: |
        $endTime   = Get-Date
        $startTime = [DateTime]::Parse($env:BUILD_START_TIME)
        $total     = [math]::Round(($endTime - $startTime).TotalSeconds, 3)
        $container = [double]$env:CONTAINER_DURATION

        echo "total_duration=$total"                         >> $env:GITHUB_OUTPUT
        echo "compile_duration=$env:COMPILE_DURATION"       >> $env:GITHUB_OUTPUT
        echo "container_duration=$container"                 >> $env:GITHUB_OUTPUT
        echo "test_duration=$env:TEST_DURATION"             >> $env:GITHUB_OUTPUT

        @{
          platform           = "windows"
          runner             = "windows-latest"
          pipeline_type      = "full-pipeline"
          total_duration     = $total
          setup_duration     = [double]$env:SETUP_DURATION
          download_duration  = [double]$env:DOWNLOAD_DURATION
          compile_duration   = [double]$env:COMPILE_DURATION
          container_duration = $container
          publish_duration   = [double]$env:PUBLISH_DURATION
          test_duration      = [double]$env:TEST_DURATION
          timestamp          = $endTime.ToString('yyyy-MM-ddTHH:mm:ss.fffZ')
          github_run_id      = $env:GITHUB_RUN_ID
          al_tools_version   = "${{ env.AL_TOOLS_VERSION }}"
          bc_version         = "${{ env.BC_VERSION }}"
        } | ConvertTo-Json | Out-File "windows-full-metrics.json" -Encoding UTF8

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-full-artifacts
        path: |
          *.app
          windows-full-metrics.json
        retention-days: 30

# ============================================================================
# COMPARISON JOB  -- runs after both platform jobs complete
#
# IMPORTANT: linux-full and windows-full are conditional on run_type == 'full-pipeline'.
# GitHub Actions treats a skipped job as a failed dependency if it appears in
# `needs`, so we cannot list them unconditionally here.  Instead we use
# `needs` only for the two compile jobs and rely on download-artifact's
# error-handling to gracefully handle absent full-pipeline artifacts.
# ============================================================================
  compare:
    runs-on: ubuntu-latest
    name: Compare Results
    needs: [linux-compile, linux-full]
    # Run even if compile jobs fail so we still get a partial report
    if: always() && !cancelled()

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download all metrics artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./metrics
      continue-on-error: true

    - name: Fetch GitHub Actions job timings
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p metrics/gh_timings
        for job in "Linux - Compile" "Windows - Compile" "Linux - Full Pipeline" "Windows - Full Pipeline"; do
          slug=$(echo "$job" | tr ' ' '-' | tr '[:upper:]' '[:lower:]')
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            --jq "[.jobs[] | select(.name == \"$job\")] | if length > 0 then .[0] | {name, started_at, completed_at, conclusion, duration_seconds: (((.completed_at // now | fromdateiso8601) - (.started_at | fromdateiso8601)))} else {name: \"$job\", duration_seconds: null} end" \
            > "metrics/gh_timings/${slug}.json" 2>/dev/null || echo '{}' > "metrics/gh_timings/${slug}.json"
        done
        echo "GitHub timings fetched:"
        ls -la metrics/gh_timings/

    - name: Generate comparison report
      run: |
        python3 << 'PYTHON'
        import json, os
        from pathlib import Path
        from datetime import datetime

        metrics_dir = Path('./metrics')

        def load_json(pattern):
            files = list(metrics_dir.rglob(pattern))
            if not files:
                return None
            try:
                with open(files[0], encoding='utf-8-sig') as f:
                    return json.load(f)
            except Exception as e:
                print(f"  Warning: failed to load {pattern}: {e}")
                return None

        def load_gh_timing(slug):
            f = metrics_dir / 'gh_timings' / f'{slug}.json'
            if f.exists():
                try:
                    d = json.loads(f.read_text())
                    return d.get('duration_seconds')
                except Exception:
                    pass
            return None

        linux_compile   = load_json('linux-compile-metrics.json')
        windows_compile = load_json('windows-compile-metrics.json')
        linux_full      = load_json('linux-full-metrics.json')
        windows_full    = load_json('windows-full-metrics.json')

        run_type       = "${{ inputs.run_type }}"
        compile_target = "${{ inputs.compile_target }}" or "bcapps-system-app"
        desc           = "${{ inputs.description }}"
        bc_ver         = "${{ env.BC_VERSION }}"

        target_label = "BCApps System Application" if compile_target == "bcapps-system-app" else "Sample Extension"

        def fmt(val, unit='s'):
            if val is None: return 'N/A'
            try:
                return f'{float(val):.2f}{unit}'
            except (TypeError, ValueError):
                return 'N/A'

        def speedup(linux_val, windows_val):
            try:
                l, w = float(linux_val), float(windows_val)
            except (TypeError, ValueError):
                return ''
            if l <= 0: return ''
            diff = (w - l) / l * 100
            if diff > 0:
                return f'Linux {diff:.1f}% faster'
            else:
                return f'Windows {abs(diff):.1f}% faster'

        lines = []
        lines.append('# BC Pipeline Performance: Linux vs Windows\n')
        if desc:
            lines.append(f'> {desc}\n')
        lines.append(f'*Compile target: `{target_label}` | BC version: `{bc_ver}` | AL tools: `${{ env.AL_TOOLS_VERSION }}` | Run: `${{ github.run_id }}`*\n')
        lines.append(f'*Generated: {datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")}*\n')

        # -- Compile comparison ------------------------------------------------
        lines.append('\n## Compile-Only Performance\n')
        if linux_compile and windows_compile:
            lc, wc = linux_compile, windows_compile
            lc_gh = load_gh_timing('linux---compile')
            wc_gh = load_gh_timing('windows---compile')

            has_clone = lc.get('clone_duration') or wc.get('clone_duration')

            rows = [
                ('Phase',                    'Linux (ubuntu-latest)',                        'Windows (windows-2022)',                       'Difference'),
                ('---',                      '---',                                          '---',                                          '---'),
                ('Setup (AL tools install)', fmt(lc.get('setup_duration')),                  fmt(wc.get('setup_duration')),                  speedup(lc.get('setup_duration'),    wc.get('setup_duration'))),
                ('Symbol download',          fmt(lc.get('download_duration')),               fmt(wc.get('download_duration')),               speedup(lc.get('download_duration'), wc.get('download_duration'))),
            ]
            if has_clone:
                rows.append(('BCApps clone', fmt(lc.get('clone_duration')), fmt(wc.get('clone_duration')), speedup(lc.get('clone_duration'), wc.get('clone_duration'))))
            has_dotnet = lc.get('dotnet_dl_duration') or wc.get('dotnet_dl_duration')
            if has_dotnet:
                lc_label = 'Partial ZIP (Python)'
                wc_label = 'New-BcCompilerFolder'
                rows.append((f'Dotnet packages ({lc_label} / {wc_label})', fmt(lc.get('dotnet_dl_duration')), fmt(wc.get('dotnet_dl_duration')), speedup(lc.get('dotnet_dl_duration'), wc.get('dotnet_dl_duration'))))
            rows += [
                ('AL compilation',            fmt(lc.get('compile_duration')),               fmt(wc.get('compile_duration')),                speedup(lc.get('compile_duration'),  wc.get('compile_duration'))),
                ('**Total (measured)**',      f"**{fmt(lc.get('total_duration'))}**",        f"**{fmt(wc.get('total_duration'))}**",         f"**{speedup(lc.get('total_duration'), wc.get('total_duration'))}**"),
            ]
            if lc_gh is not None or wc_gh is not None:
                rows.append(('GitHub Actions total', fmt(lc_gh), fmt(wc_gh), speedup(lc_gh, wc_gh)))
            for r in rows:
                lines.append('| ' + ' | '.join(str(x) for x in r) + ' |')
        else:
            lines.append('_Compile metrics not available (one or both jobs failed or were skipped)._\n')

        # -- Full pipeline comparison ------------------------------------------
        if run_type == 'full-pipeline':
            lines.append('\n## Full Pipeline Performance\n')
            if linux_full and windows_full:
                lf, wf = linux_full, windows_full
                lf_gh = load_gh_timing('linux---full-pipeline')
                wf_gh = load_gh_timing('windows---full-pipeline')

                rows = [
                    ('Phase',               'Linux (ubuntu-latest)',                                                              'Windows (windows-latest)',              'Difference'),
                    ('---',                 '---',                                                                                '---',                                   '---'),
                    ('Setup + tools',        fmt(lf.get('setup_duration')),                                                       fmt(wf.get('setup_duration')),           speedup(lf.get('setup_duration'),    wf.get('setup_duration'))),
                    ('Symbol download',      fmt(lf.get('download_duration')),                                                    fmt(wf.get('download_duration')),        speedup(lf.get('download_duration'), wf.get('download_duration'))),
                    ('AL compilation',       fmt(lf.get('compile_duration')),                                                     fmt(wf.get('compile_duration')),         speedup(lf.get('compile_duration'),  wf.get('compile_duration'))),
                    ('Container setup',      fmt(lf.get('container_total_duration', lf.get('container_duration'))),               fmt(wf.get('container_duration')),       speedup(lf.get('container_total_duration', lf.get('container_duration')), wf.get('container_duration'))),
                    ('Test execution',       fmt(lf.get('test_duration')),                                                        fmt(wf.get('test_duration')),            speedup(lf.get('test_duration'),     wf.get('test_duration'))),
                    ('**Total (measured)**', f"**{fmt(lf.get('total_duration'))}**",                                              f"**{fmt(wf.get('total_duration'))}**",  f"**{speedup(lf.get('total_duration'), wf.get('total_duration'))}**"),
                ]
                if lf_gh is not None or wf_gh is not None:
                    rows.append(('GitHub Actions total', fmt(lf_gh), fmt(wf_gh), speedup(lf_gh, wf_gh)))
                for r in rows:
                    lines.append('| ' + ' | '.join(str(x) for x in r) + ' |')
            else:
                lines.append('_Full pipeline metrics not available._\n')

        lines.append('\n---')
        lines.append('\n*Linux runner uses [BCDevOnLinux](https://github.com/StefanMaron/BCDevOnLinux) (Wine-based BC on Docker)*')
        lines.append('*Windows runner uses BcContainerHelper with native Windows BC container*')

        report = '\n'.join(lines)
        print(report)

        with open('performance-comparison.md', 'w') as f:
            f.write(report)
        print('\nSaved to performance-comparison.md')
        PYTHON

    - name: Post results to job summary
      if: always()
      run: |
        if [ -f performance-comparison.md ]; then
          cat performance-comparison.md >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload comparison report
      uses: actions/upload-artifact@v4
      with:
        name: performance-comparison
        path: performance-comparison.md
        retention-days: 90
