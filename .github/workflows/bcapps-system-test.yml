name: BCApps System Application Tests (Linux Headless)

on:
  workflow_dispatch:
    inputs:
      bc_version:
        description: 'BC version (e.g. 27.5.46862.48004)'
        required: false
        default: '27.5.46862.48004'
        type: string
      description:
        description: 'Run description (optional)'
        required: false
        type: string

env:
  BC_VERSION: ${{ inputs.bc_version || '27.5.46862.48004' }}
  PLATFORM_VERSION: '27.0.46760'
  AL_TOOLS_VERSION: '16.2.28.57946'
  BCAPPS_TAG: 'releases/27.5/StrictMode'
  BC_ARTIFACT_BASE: 'https://bcartifacts-exdbf9fwegejdqak.b02.azurefd.net/sandbox'

jobs:
  bcapps-test:
    runs-on: ubuntu-latest
    name: BCApps System App Tests
    timeout-minutes: 300

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Record start time
      run: echo "START_EPOCH=$(date +%s.%N)" >> $GITHUB_ENV

    - name: Setup .NET and AL tools
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install AL compiler
      run: |
        dotnet tool install -g Microsoft.Dynamics.BusinessCentral.Development.Tools.Linux \
          --version ${{ env.AL_TOOLS_VERSION }} || true
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Clone BCApps and build alDirectCompile
      run: |
        STEP_START=$(date +%s.%N)

        # Clone BCApps System Application source
        echo "Cloning microsoft/BCApps branch ${{ env.BCAPPS_TAG }}..."
        git clone --depth 1 --branch ${{ env.BCAPPS_TAG }} --single-branch \
          https://github.com/microsoft/BCApps bcapps-temp &
        BCAPPS_PID=$!

        # Build alDirectCompile (Docker image + TestRunner)
        echo "Cloning alDirectCompile..."
        git clone --depth 1 https://github.com/StefanMaron/alDirectCompile.git aldirectcompile
        cd aldirectcompile/StartupHook
        dotnet publish -c Release -o bin/Release/net8.0/publish 2>&1 | tail -3
        # Ensure net8.0 unix SqlClient
        strings bin/Release/net8.0/publish/Microsoft.Data.SqlClient.dll | grep -q "9.0.0.0" && {
          echo "Fixing SqlClient to net8.0 build"
          cp ~/.nuget/packages/microsoft.data.sqlclient/6.0.5/runtimes/unix/lib/net8.0/Microsoft.Data.SqlClient.dll bin/Release/net8.0/publish/
        } || echo "SqlClient OK"
        cd ../..

        # Save TestRunner.app
        cp aldirectcompile/TestRunnerExtension/TestRunner.app TestRunner.app

        # Wait for BCApps clone
        wait $BCAPPS_PID
        AL_COUNT=$(find bcapps-temp/src/System\ Application/App -name "*.al" 2>/dev/null | wc -l)
        TEST_COUNT=$(find bcapps-temp/src/System\ Application/Test -name "*.al" 2>/dev/null | wc -l)
        echo "System Application: $AL_COUNT AL files, Test: $TEST_COUNT AL files"

        STEP_END=$(date +%s.%N)
        echo "SETUP_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Download BC artifacts (on host)
      run: |
        STEP_START=$(date +%s.%N)
        BC_URL="${{ env.BC_ARTIFACT_BASE }}/${{ env.BC_VERSION }}/w1"
        PLATFORM_URL="${{ env.BC_ARTIFACT_BASE }}/${{ env.BC_VERSION }}/platform"
        DEST="$(pwd)/bc-artifacts"
        mkdir -p "$DEST/app" "$DEST/platform"

        echo "Downloading app artifact..."
        curl -sSL "$BC_URL" -o "$DEST/bc-app.zip"
        unzip -qo "$DEST/bc-app.zip" -d "$DEST/app"
        rm -f "$DEST/bc-app.zip"

        echo "Downloading platform artifact..."
        curl -sSL "$PLATFORM_URL" -o "$DEST/bc-platform.zip"
        unzip -qo "$DEST/bc-platform.zip" -d "$DEST/platform"
        rm -f "$DEST/bc-platform.zip"

        echo "Artifacts: $(du -sh "$DEST" | cut -f1)"
        STEP_END=$(date +%s.%N)
        echo "DOWNLOAD_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Prepare runtime patches
      run: |
        STEP_START=$(date +%s.%N)
        cd aldirectcompile
        ARTIFACTS_PATH="$(cd .. && pwd)/bc-artifacts"

        # 1. Copy .NET 8 reference assemblies for the Docker image
        REF_DIR=$(find "$DOTNET_ROOT/packs/Microsoft.NETCore.App.Ref" /usr/share/dotnet/packs/Microsoft.NETCore.App.Ref \
          -maxdepth 3 -type d -name "net8.0" 2>/dev/null | head -1)
        if [ -n "$REF_DIR" ]; then
          cp "$REF_DIR"/*.dll StartupHook/refasm/
          echo "Copied $(ls StartupHook/refasm/*.dll | wc -l) reference assemblies from $REF_DIR"
        else
          echo "WARNING: .NET 8 reference assemblies not found"
        fi

        # 2. Build merged type-forward assemblies
        echo "Building merged assemblies..."
        cd tools/MergeNetstandard
        BASE_DIR="$(cd ../.. && pwd)" PLATFORM_DIR="$ARTIFACTS_PATH/platform" dotnet run 2>&1 | tail -5
        cd ../..

        # 3. Copy MockTest.dll from artifacts
        MOCK_DLL=$(find "$ARTIFACTS_PATH/platform" -path "*/Mock Assemblies/MockTest.dll" 2>/dev/null | head -1)
        [ -n "$MOCK_DLL" ] && cp "$MOCK_DLL" StartupHook/testdata/MockTest.dll && echo "Copied MockTest.dll"

        echo "Patched: $(ls StartupHook/patched/*.dll 2>/dev/null | wc -l) DLLs"
        echo "Refasm: $(ls StartupHook/refasm/*.dll 2>/dev/null | wc -l) DLLs"
        cd ..
        STEP_END=$(date +%s.%N)
        echo "PATCH_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Start BC service tier
      run: |
        STEP_START=$(date +%s.%N)
        cd aldirectcompile
        ARTIFACTS_PATH="$(cd .. && pwd)/bc-artifacts"
        printf "BC_ARTIFACT_URL=skip\nSA_PASSWORD=Passw0rd123!\n" > .env

        docker compose build --no-cache bc
        docker compose up -d

        # Copy artifacts into container
        echo "Copying artifacts into container..."
        docker compose exec bc mkdir -p /bc/artifacts/app /bc/artifacts/platform
        docker compose cp "$ARTIFACTS_PATH/app/." bc:/bc/artifacts/app/
        docker compose cp "$ARTIFACTS_PATH/platform/." bc:/bc/artifacts/platform/
        echo "Artifacts copied."

        echo "Waiting for BC..."
        for i in $(seq 1 120); do
          docker compose logs bc 2>&1 | grep -q "Press Enter" && { echo "BC ready after $((i*5))s"; break; }
          if [ $((i % 6)) -eq 0 ]; then
            LAST=$(docker compose logs bc 2>&1 | grep "\[entrypoint\]\|\[StartupHook\]\|Exception\|ERROR" | tail -1)
            echo "  $((i*5))s: $LAST"
          fi
          if ! docker compose ps bc 2>/dev/null | grep -q "Up"; then
            echo "ERROR: BC container died — full logs:"
            docker compose logs bc 2>&1
            exit 1
          fi
          sleep 5
        done
        if ! docker compose logs bc 2>&1 | grep -q "Press Enter"; then
          echo "ERROR: BC did not start — full logs:"
          docker compose logs bc 2>&1
          exit 1
        fi
        INSTANCE=$(docker compose exec bc grep -oP 'ServerInstance" value="\K[^"]+' /bc/service/CustomSettings.config 2>/dev/null || echo "InstanceName")
        echo "INSTANCE=$INSTANCE" >> $GITHUB_ENV
        cd ..
        STEP_END=$(date +%s.%N)
        echo "CONTAINER_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Prepare symbols and dependencies
      run: |
        STEP_START=$(date +%s.%N)
        mkdir -p .alpackages mock-assemblies service-dlls

        # Copy all extension .app files as symbols
        find bc-artifacts/app/Extensions -name "*.app" -exec cp {} .alpackages/ \;

        # Copy System.app from platform
        SYSTEM_APP=$(find bc-artifacts/platform/ModernDev -name "System.app" 2>/dev/null | head -1)
        [ -n "$SYSTEM_APP" ] && cp "$SYSTEM_APP" .alpackages/System.app

        # Copy test toolkit .app files
        find bc-artifacts/platform/applications/testframework -name "*.app" -exec cp {} .alpackages/ \; 2>/dev/null
        find bc-artifacts/platform/applications -path "*/Test/*.app" -exec cp {} .alpackages/ \; 2>/dev/null

        echo "Symbols: $(ls .alpackages/*.app 2>/dev/null | wc -l) .app files"

        # Copy mock assemblies
        find bc-artifacts/platform -path "*Mock Assemblies*" -name "*.dll" -exec cp {} mock-assemblies/ \; 2>/dev/null
        echo "Mock assemblies: $(ls mock-assemblies/*.dll 2>/dev/null | wc -l) DLLs"

        # Build assembly probing paths for AL compiler
        mkdir -p service-dlls
        SVC_DIR=$(find bc-artifacts/platform/ServiceTier -name "Microsoft.Dynamics.Nav.Server.dll" -printf "%h\n" 2>/dev/null | head -1)
        if [ -n "$SVC_DIR" ]; then
          find "$SVC_DIR" -name "*.dll" | while read f; do
            case "$(basename "$f")" in
              System.*) ;;
              *) cp -n "$f" service-dlls/ 2>/dev/null ;;
            esac
          done
          for dll in System.Drawing.Common.dll System.IdentityModel.Tokens.Jwt.dll System.Private.ServiceModel.dll; do
            find "$SVC_DIR" -name "$dll" 2>/dev/null | head -1 | xargs -I{} cp {} service-dlls/ 2>/dev/null
          done
          # DrawingStub provides System.Drawing.Common types for AL compiler on Linux
          DRAWING_STUB="aldirectcompile/StartupHook/DrawingStub/bin/Release/net8.0/System.Drawing.Common.dll"
          [ -f "$DRAWING_STUB" ] && cp "$DRAWING_STUB" service-dlls/System.Drawing.Common.dll && echo "Added DrawingStub"
          # System.Drawing.dll (v4.0.0.0 compat shim) from WebClient refs
          SYSDRAWING=$(find bc-artifacts/platform -path "*/WebClient/*/refs/System.Drawing.dll" 2>/dev/null | head -1)
          [ -n "$SYSDRAWING" ] && cp "$SYSDRAWING" service-dlls/ && echo "Added System.Drawing.dll from WebClient refs"
          find bc-artifacts/platform -path "*Test Assemblies*" -name "*.dll" -exec cp -n {} service-dlls/ \; 2>/dev/null
          find bc-artifacts/platform -path "*Mock Assemblies*" -name "*.dll" -exec cp -n {} service-dlls/ \; 2>/dev/null
          echo "Service DLLs: $(ls service-dlls/*.dll 2>/dev/null | wc -l)"
        fi

        # Patch dotnet.al: comment out FaultException alias (Cecil can't resolve type forwarding)
        sed -i '/assembly("System.ServiceModel.Primitives")/,/^    }/{s/^/\/\//}' \
          "bcapps-temp/src/System Application/App/DotNet Aliases/src/dotnet.al" 2>/dev/null
        # Patch dotnet.al: redirect ImageFormatConverter from System.Drawing to System.Drawing.Common
        # (System.Drawing is a type-forwarding shim that Cecil can't follow without patched CodeAnalysis.dll)
        sed -i 's/assembly("System.Drawing")/assembly("System.Drawing.Common")/' \
          "bcapps-temp/src/System Application/App/DotNet Aliases/src/dotnet.al" 2>/dev/null

        # .NET 8 reference assemblies for AL compiler probing
        REF_DIR=$(find "$DOTNET_ROOT/packs/Microsoft.NETCore.App.Ref" /usr/share/dotnet/packs/Microsoft.NETCore.App.Ref \
          -maxdepth 3 -type d -name "net8.0" 2>/dev/null | head -1)
        PROBING="$REF_DIR,$(pwd)/service-dlls,$(pwd)/mock-assemblies"
        echo "PROBING_PATHS=$PROBING" >> $GITHUB_ENV
        echo "Assembly probing: $PROBING"

        # Fix backslash paths in ControlAddIn resource declarations only
        # (Scripts, StartupScript, RefreshScript, RecreateScript, StyleSheets lines)
        # Do NOT replace backslashes globally — AL uses \ in field names like "Start Date\Time"
        find bcapps-temp/src/System\ Application -name "*.al" \
          -exec sed -i '/^\s*\(Scripts\|StartupScript\|RefreshScript\|RecreateScript\|StyleSheets\)\s*=/s|\\|/|g' {} \; 2>/dev/null
        echo "Fixed backslash paths in ControlAddIn resource declarations"

        STEP_END=$(date +%s.%N)
        echo "PREPARE_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Compile System Application
      env:
        DOTNET_ReadyToRun: '0'
        COMPlus_ReadyToRun: '0'
      run: |
        STEP_START=$(date +%s.%N)
        echo "Compiling System Application..."
        AL compile \
          "/project:bcapps-temp/src/System Application/App" \
          "/packagecachepath:$(pwd)/.alpackages" \
          "/assemblyProbingPaths:$PROBING_PATHS" \
          || { echo "ERROR: System Application compilation failed"; exit 1; }

        find "bcapps-temp/src/System Application/App" -maxdepth 1 -name "*.app" -exec cp {} .alpackages/ \;
        find "bcapps-temp/src/System Application/App" -maxdepth 1 -name "*.app" -exec cp {} . \;
        echo "Compiled: $(ls -la bcapps-temp/src/System\ Application/App/*.app 2>/dev/null)"

        STEP_END=$(date +%s.%N)
        echo "SYSAPP_COMPILE_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Compile System Application Test Library
      env:
        DOTNET_ReadyToRun: '0'
        COMPlus_ReadyToRun: '0'
      run: |
        STEP_START=$(date +%s.%N)
        echo "Compiling System Application Test Library..."
        AL compile \
          "/project:bcapps-temp/src/System Application/Test Library" \
          "/packagecachepath:$(pwd)/.alpackages" \
          "/assemblyProbingPaths:$PROBING_PATHS" \
          || echo "WARNING: Test Library compilation failed"
        find "bcapps-temp/src/System Application/Test Library" -maxdepth 1 -name "*.app" -exec cp {} .alpackages/ \; 2>/dev/null
        find "bcapps-temp/src/System Application/Test Library" -maxdepth 1 -name "*.app" -exec cp {} . \; 2>/dev/null
        STEP_END=$(date +%s.%N)
        echo "TESTLIB_COMPILE_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Compile System Application Test
      env:
        DOTNET_ReadyToRun: '0'
        COMPlus_ReadyToRun: '0'
      run: |
        STEP_START=$(date +%s.%N)
        echo "Compiling System Application Test..."
        AL compile \
          "/project:bcapps-temp/src/System Application/Test" \
          "/packagecachepath:$(pwd)/.alpackages" \
          "/assemblyProbingPaths:$PROBING_PATHS" \
          || { echo "ERROR: System Application Test compilation failed"; exit 1; }

        find "bcapps-temp/src/System Application/Test" -maxdepth 1 -name "*.app" -exec cp {} . \;
        echo "Compiled: $(ls -la bcapps-temp/src/System\ Application/Test/*.app 2>/dev/null)"

        STEP_END=$(date +%s.%N)
        echo "TEST_COMPILE_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Publish extensions to BC
      run: |
        STEP_START=$(date +%s.%N)
        DEV="http://localhost:7049/$INSTANCE/dev/apps?SchemaUpdateMode=forcesync"
        AUTH="admin:Admin123!"

        publish_app() {
          local FILE="$1" NAME="$2"
          RESP=$(curl -s -w "\n%{http_code}" --max-time 180 \
            -u "$AUTH" -X POST \
            -F "file=@$FILE;type=application/octet-stream" "$DEV")
          HTTP=$(echo "$RESP" | tail -1)
          echo "  $NAME: HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "$RESP" | head -1 | python3 -c "import json,sys; print(json.load(sys.stdin).get('Message','')[:500])" 2>/dev/null || true
          fi
        }

        # System Application (compiled from BCApps source)
        SYSAPP=$(find . -maxdepth 1 -name "*System*Application*.app" ! -name "*Test*" | head -1)
        publish_app "$SYSAPP" "System Application"

        # Test framework dependencies (pre-compiled from platform artifacts)
        for lib in assert "variable storage" "permissions mock"; do
          LIB_APP=$(find bc-artifacts/platform -ipath "*testlibraries*$lib*/*.app" 2>/dev/null | head -1)
          [ -n "$LIB_APP" ] && publish_app "$LIB_APP" "$(basename "$LIB_APP" .app)"
        done
        ANY_APP=$(find bc-artifacts -name "*_Any*.app" 2>/dev/null | head -1)
        [ -n "$ANY_APP" ] && publish_app "$ANY_APP" "Any"

        # MS Test Runner (codeunits 130450-130456, from platform artifacts)
        TR_APP=$(find bc-artifacts/platform -ipath "*testframework/TestRunner*/*.app" 2>/dev/null | head -1)
        [ -n "$TR_APP" ] && publish_app "$TR_APP" "Test Runner (MS)"

        # System Application Test Library + Test (compiled from BCApps source)
        TESTLIB=$(find . -maxdepth 1 -name "*Test*Library*.app" | head -1)
        [ -n "$TESTLIB" ] && publish_app "$TESTLIB" "Test Library"
        TESTAPP=$(find . -maxdepth 1 -name "*System*Application*Test*.app" ! -name "*Library*" | head -1)
        [ -n "$TESTAPP" ] && publish_app "$TESTAPP" "System Application Test"

        STEP_END=$(date +%s.%N)
        echo "PUBLISH_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Initialize demo data
      run: |
        STEP_START=$(date +%s.%N)
        AUTH="admin:Admin123!"
        SA_PASSWORD="Passw0rd123!"

        # SQL helper (runs queries via docker exec on the SQL container)
        SQL_ID=$(cd aldirectcompile && docker compose ps -q sql 2>/dev/null | head -1)
        run_sql() {
          docker exec -e "_QB=$(echo "$1" | base64 -w0)" "$SQL_ID" bash -c \
            'echo "$_QB" | base64 -d | /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "'"$SA_PASSWORD"'" -C -No -i /dev/stdin' 2>&1
        }

        # Get company name
        COMPANY=$(run_sql "USE [CRONUS]; SELECT TOP 1 RTRIM([Name]) FROM [Company] WHERE [Name] != 'My Company' ORDER BY [Name]" \
          | grep -v "^-" | grep -v "^Changed" | grep -v "^$" | grep -v "^(" | head -1 | sed 's/ *$//')
        [ -z "$COMPANY" ] && COMPANY="CRONUS International Ltd."
        echo "Company: $COMPANY"
        echo "COMPANY=$COMPANY" >> $GITHUB_ENV

        # Run demo data initialization via WebSocket client services (page 130455 approach)
        # Build TestRunner from bc-linux
        echo "Building TestRunner..."
        git clone --depth 1 https://github.com/StefanMaron/MsDyn365Bc.On.Linux.git bc-linux-tools
        dotnet build bc-linux-tools/tools/TestRunner -c Release 2>&1 | tail -3

        # Initialize demo data by running init codeunits via SQL-triggered test suite
        # (These codeunits are not tests but we trigger them via the same mechanism)
        TABLE_PREFIX="$(echo "${COMPANY}" | sed 's/\.//g')_\$"
        SUITE_TABLE="${TABLE_PREFIX}AL Test Suite\$23de40a6-dfe8-4f80-80db-d70f83ce8caf"
        METHOD_TABLE="${TABLE_PREFIX}Test Method Line\$23de40a6-dfe8-4f80-80db-d70f83ce8caf"

        for CU_ID in 2 5193 5691; do
          echo "  Running CU $CU_ID..."
          # Create a temporary test suite for this init codeunit
          run_sql "
          USE [CRONUS];
          DELETE FROM [$METHOD_TABLE] WHERE [Test Suite] = N'INIT';
          DELETE FROM [$SUITE_TABLE] WHERE [Name] = N'INIT';
          INSERT INTO [$SUITE_TABLE] ([Name],[Description],[Last Run],[Run Type],[Test Runner Id],[Stability Run],
            [CC Tracking Type],[CC Track All Sessions],[CC Exporter ID],[CC Coverage Map],
            [\$systemId],[\$systemCreatedAt],[\$systemCreatedBy],[\$systemModifiedAt],[\$systemModifiedBy])
          VALUES (N'INIT',N'','1753-01-01',0,130451,0,0,0,0,0,
            NEWID(),GETUTCDATE(),'00000000-0000-0000-0000-000000000001',
            GETUTCDATE(),'00000000-0000-0000-0000-000000000001');
          SET IDENTITY_INSERT [$METHOD_TABLE] ON;
          INSERT INTO [$METHOD_TABLE] ([Test Suite],[Line No_],[Test Codeunit],[Name],[Function],[Run],[Result],[Line Type],
            [Start Time],[Finish Time],[Level],[Error Message Preview],[Error Code],
            [Error Message],[Error Call Stack],[Skip Logging Results],[Data Input Group Code],[Data Input],
            [\$systemId],[\$systemCreatedAt],[\$systemCreatedBy],[\$systemModifiedAt],[\$systemModifiedBy])
          VALUES (N'INIT',10000,$CU_ID,N'Init',N'',1,0,0,'1753-01-01','1753-01-01',0,N'',N'',0x,0x,0,N'',0x,
            NEWID(),GETUTCDATE(),'00000000-0000-0000-0000-000000000001',
            GETUTCDATE(),'00000000-0000-0000-0000-000000000001');
          SET IDENTITY_INSERT [$METHOD_TABLE] OFF;
          " > /dev/null 2>&1
          # Trigger execution via WebSocket
          timeout 120 dotnet run --project bc-linux-tools/tools/TestRunner --no-build -c Release -- \
            --host localhost:7085 --company "$COMPANY" --timeout 2 2>&1 | tail -3 || true
          sleep 2
        done
        # Clean up init suite
        run_sql "USE [CRONUS]; DELETE FROM [$METHOD_TABLE] WHERE [Test Suite] = N'INIT'; DELETE FROM [$SUITE_TABLE] WHERE [Name] = N'INIT';" > /dev/null 2>&1

        STEP_END=$(date +%s.%N)
        echo "DEMODATA_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Run System Application Tests
      run: |
        STEP_START=$(date +%s.%N)
        AUTH="admin:Admin123!"
        SA_PASSWORD="Passw0rd123!"

        # Find the compiled test .app
        TESTAPP=$(find . -maxdepth 1 -name "*System*Application*Test*.app" ! -name "*Library*" | head -1)
        echo "Test app: $TESTAPP"

        # Use bc-linux run-tests.sh
        chmod +x bc-linux-tools/scripts/run-tests.sh

        bc-linux-tools/scripts/run-tests.sh \
          --app "$TESTAPP" \
          --company "$COMPANY" \
          --timeout 60 \
          --sql-password "$SA_PASSWORD"

        # Capture results from exit code
        TEST_EXIT=$?

        # Read counts from SQL for metrics
        SQL_ID=$(cd aldirectcompile && docker compose ps -q sql 2>/dev/null | head -1)
        run_sql() {
          docker exec -e "_QB=$(echo "$1" | base64 -w0)" "$SQL_ID" bash -c \
            'echo "$_QB" | base64 -d | /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "'"$SA_PASSWORD"'" -C -No -i /dev/stdin' 2>&1
        }
        TABLE_PREFIX="$(echo "${COMPANY}" | sed 's/\.//g')_\$"
        METHOD_TABLE="${TABLE_PREFIX}Test Method Line\$23de40a6-dfe8-4f80-80db-d70f83ce8caf"

        sql_count() { run_sql "$1" | grep -oP '^\s+\d+' | tr -d ' ' | tail -1; }
        TEST_TOTAL=$(sql_count "USE [CRONUS]; SELECT COUNT(*) FROM [$METHOD_TABLE] WHERE [Test Suite] = N'DEFAULT' AND [Line Type] = 0")
        TEST_PASSED=$(sql_count "USE [CRONUS]; SELECT COUNT(*) FROM [$METHOD_TABLE] WHERE [Test Suite] = N'DEFAULT' AND [Line Type] = 0 AND [Result] IN (2,3)")
        TEST_FAILED=$(sql_count "USE [CRONUS]; SELECT COUNT(*) FROM [$METHOD_TABLE] WHERE [Test Suite] = N'DEFAULT' AND [Line Type] = 0 AND [Result] = 1")
        TEST_SKIPPED=$(sql_count "USE [CRONUS]; SELECT COUNT(*) FROM [$METHOD_TABLE] WHERE [Test Suite] = N'DEFAULT' AND [Line Type] = 0 AND [Result] = 0")

        echo "TEST_TOTAL=${TEST_TOTAL:-0}" >> $GITHUB_ENV
        echo "TEST_PASSED=${TEST_PASSED:-0}" >> $GITHUB_ENV
        echo "TEST_FAILED=${TEST_FAILED:-0}" >> $GITHUB_ENV
        echo "TEST_SKIPPED=${TEST_SKIPPED:-0}" >> $GITHUB_ENV
        echo "TEST_ERRORS=0" >> $GITHUB_ENV

        STEP_END=$(date +%s.%N)
        echo "TEST_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Record metrics
      if: always()
      run: |
        TOTAL=$(python3 -c "print(f'{$(date +%s.%N) - ${{ env.START_EPOCH }}:.3f}')")
        echo "=== Pipeline Timing ==="
        echo "Setup (clone + build):  ${SETUP_DURATION:-n/a}s"
        echo "Download artifacts:     ${DOWNLOAD_DURATION:-n/a}s"
        echo "Prepare patches:        ${PATCH_DURATION:-n/a}s"
        echo "BC container start:     ${CONTAINER_DURATION:-n/a}s"
        echo "Prepare symbols:        ${PREPARE_DURATION:-n/a}s"
        echo "Compile System App:     ${SYSAPP_COMPILE_DURATION:-n/a}s"
        echo "Compile Test Library:   ${TESTLIB_COMPILE_DURATION:-n/a}s"
        echo "Compile System App Test:${TEST_COMPILE_DURATION:-n/a}s"
        echo "Publish extensions:     ${PUBLISH_DURATION:-n/a}s"
        echo "Demo data init:         ${DEMODATA_DURATION:-n/a}s"
        echo "Run tests:              ${TEST_DURATION:-n/a}s"
