name: BCApps System Application Tests (Linux Headless)

on:
  workflow_dispatch:
    inputs:
      bc_version:
        description: 'BC version (e.g. 27.5.46862.48004)'
        required: false
        default: '27.5.46862.48004'
        type: string
      description:
        description: 'Run description (optional)'
        required: false
        type: string

env:
  BC_VERSION: ${{ inputs.bc_version || '27.5.46862.48004' }}
  PLATFORM_VERSION: '27.0.46760'
  AL_TOOLS_VERSION: '16.2.28.57946'
  BCAPPS_TAG: 'releases/27.5/StrictMode'
  BC_ARTIFACT_BASE: 'https://bcartifacts-exdbf9fwegejdqak.b02.azurefd.net/sandbox'

jobs:
  bcapps-test:
    runs-on: ubuntu-latest
    name: BCApps System App Tests
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Record start time
      run: echo "START_EPOCH=$(date +%s.%N)" >> $GITHUB_ENV

    - name: Setup .NET and AL tools
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install AL compiler
      run: |
        dotnet tool install -g Microsoft.Dynamics.BusinessCentral.Development.Tools.Linux \
          --version ${{ env.AL_TOOLS_VERSION }} || true
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Clone BCApps and build alDirectCompile
      run: |
        STEP_START=$(date +%s.%N)

        # Clone BCApps System Application source (for test codeunit ID extraction + DisabledTests)
        echo "Cloning microsoft/BCApps branch ${{ env.BCAPPS_TAG }}..."
        git clone --depth 1 --branch ${{ env.BCAPPS_TAG }} --single-branch \
          https://github.com/microsoft/BCApps bcapps-temp &
        BCAPPS_PID=$!

        # Build alDirectCompile (Docker image + TestRunner)
        echo "Cloning alDirectCompile..."
        git clone --depth 1 https://github.com/StefanMaron/alDirectCompile.git aldirectcompile
        cd aldirectcompile/StartupHook
        dotnet publish -c Release -o bin/Release/net8.0/publish 2>&1 | tail -3
        # Ensure net8.0 unix SqlClient
        strings bin/Release/net8.0/publish/Microsoft.Data.SqlClient.dll | grep -q "9.0.0.0" && {
          echo "Fixing SqlClient to net8.0 build"
          cp ~/.nuget/packages/microsoft.data.sqlclient/6.0.5/runtimes/unix/lib/net8.0/Microsoft.Data.SqlClient.dll bin/Release/net8.0/publish/
        } || echo "SqlClient OK"
        cd ../..

        # Wait for BCApps clone
        wait $BCAPPS_PID
        echo "BCApps cloned"

        STEP_END=$(date +%s.%N)
        echo "SETUP_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Download BC artifacts (on host)
      run: |
        STEP_START=$(date +%s.%N)
        BC_URL="${{ env.BC_ARTIFACT_BASE }}/${{ env.BC_VERSION }}/w1"
        PLATFORM_URL="${{ env.BC_ARTIFACT_BASE }}/${{ env.BC_VERSION }}/platform"
        DEST="$(pwd)/bc-artifacts"
        mkdir -p "$DEST/app" "$DEST/platform"

        echo "Downloading app artifact..."
        curl -sSL "$BC_URL" -o "$DEST/bc-app.zip"
        unzip -qo "$DEST/bc-app.zip" -d "$DEST/app"
        rm -f "$DEST/bc-app.zip"

        echo "Downloading platform artifact..."
        curl -sSL "$PLATFORM_URL" -o "$DEST/bc-platform.zip"
        unzip -qo "$DEST/bc-platform.zip" -d "$DEST/platform"
        rm -f "$DEST/bc-platform.zip"

        echo "Artifacts: $(du -sh "$DEST" | cut -f1)"
        STEP_END=$(date +%s.%N)
        echo "DOWNLOAD_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Prepare runtime patches
      run: |
        STEP_START=$(date +%s.%N)
        cd aldirectcompile
        ARTIFACTS_PATH="$(cd .. && pwd)/bc-artifacts"
        SVC_DIR=$(find "$ARTIFACTS_PATH/platform/ServiceTier" -name "Microsoft.Dynamics.Nav.Server.dll" -printf "%h\n" 2>/dev/null | head -1)

        # 1. Copy .NET 8 reference assemblies (non-R2R, needed for Cecil type resolution)
        REF_DIR=$(find /usr/share/dotnet/packs/Microsoft.NETCore.App.Ref -maxdepth 2 -type d -name "net8.0" 2>/dev/null | head -1)
        if [ -n "$REF_DIR" ]; then
          cp "$REF_DIR"/*.dll StartupHook/refasm/
          echo "Copied $(ls StartupHook/refasm/*.dll | wc -l) reference assemblies"
        fi

        # 2. Build merged type-forward assemblies (netstandard, OpenXml, Drawing, Core)
        echo "Building merged assemblies..."
        cd tools/MergeNetstandard
        PLATFORM_DIR="$ARTIFACTS_PATH/platform" dotnet run 2>&1 | tail -5
        cd ../..

        # 3. Binary-patch CodeAnalysis.dll and Mono.Cecil.dll
        #    These fix Linux-specific crashes in the AL compiler's type loader
        if [ -f tools/PatchCecil/PatchCecil.csproj ]; then
          echo "Patching DLLs..."
          cd tools/PatchCecil
          PLATFORM_DIR="$ARTIFACTS_PATH/platform" dotnet run 2>&1 | tail -5
          cd ../..
        else
          echo "WARNING: PatchCecil tool not found — patched DLLs will be missing"
          echo "  Copy CodeAnalysis.dll and Mono.Cecil.dll manually to StartupHook/patched/"
        fi

        # 4. Copy MockTest.dll from artifacts
        MOCK_DLL=$(find "$ARTIFACTS_PATH/platform" -path "*/Mock Assemblies/MockTest.dll" 2>/dev/null | head -1)
        [ -n "$MOCK_DLL" ] && cp "$MOCK_DLL" StartupHook/testdata/MockTest.dll && echo "Copied MockTest.dll"

        echo "Patched: $(ls StartupHook/patched/*.dll 2>/dev/null | wc -l) DLLs"
        echo "Refasm: $(ls StartupHook/refasm/*.dll 2>/dev/null | wc -l) DLLs"

        cd ..
        STEP_END=$(date +%s.%N)
        echo "PATCH_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Start BC service tier
      run: |
        STEP_START=$(date +%s.%N)
        cd aldirectcompile
        ARTIFACTS_PATH="$(cd .. && pwd)/bc-artifacts"
        printf "BC_ARTIFACT_URL=skip\nSA_PASSWORD=Passw0rd123!\n" > .env

        docker compose build --no-cache bc
        docker compose up -d

        # Copy artifacts into container
        echo "Copying artifacts into container..."
        docker compose exec bc mkdir -p /bc/artifacts/app /bc/artifacts/platform
        docker compose cp "$ARTIFACTS_PATH/app/." bc:/bc/artifacts/app/
        docker compose cp "$ARTIFACTS_PATH/platform/." bc:/bc/artifacts/platform/
        echo "Artifacts copied."

        echo "Waiting for BC..."
        for i in $(seq 1 120); do
          docker compose logs bc 2>&1 | grep -q "Press Enter" && { echo "BC ready after $((i*5))s"; break; }
          if [ $((i % 6)) -eq 0 ]; then
            LAST=$(docker compose logs bc 2>&1 | grep "\[entrypoint\]\|\[StartupHook\]\|Exception\|ERROR" | tail -1)
            echo "  $((i*5))s: $LAST"
          fi
          if ! docker compose ps bc 2>/dev/null | grep -q "Up"; then
            echo "ERROR: BC container died — full logs:"
            docker compose logs bc 2>&1
            exit 1
          fi
          sleep 5
        done
        if ! docker compose logs bc 2>&1 | grep -q "Press Enter"; then
          echo "ERROR: BC did not start — full logs:"
          docker compose logs bc 2>&1
          exit 1
        fi
        INSTANCE=$(docker compose exec bc grep -oP 'ServerInstance" value="\K[^"]+' /bc/service/CustomSettings.config 2>/dev/null || echo "InstanceName")
        echo "INSTANCE=$INSTANCE" >> $GITHUB_ENV
        cd ..
        STEP_END=$(date +%s.%N)
        echo "CONTAINER_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Publish test framework apps
      run: |
        STEP_START=$(date +%s.%N)
        AUTH="admin:Admin123!"
        DEV="http://localhost:7049/$INSTANCE/dev/apps?SchemaUpdateMode=forcesync"
        APPS_DIR="bc-artifacts/platform/applications"

        publish_app() {
          local FILE="$1" NAME="$2"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 \
            -u "$AUTH" -X POST \
            -F "file=@$FILE;type=application/octet-stream" "$DEV")
          echo "  $NAME: HTTP $HTTP"
          [ "$HTTP" = "200" ] || { echo "WARNING: Failed to publish $NAME"; return 1; }
        }

        # System Application is pre-installed from CRONUS backup (kept by entrypoint).
        # Only publish test framework + test apps on top.
        echo "Publishing test framework apps (System Application pre-installed from CRONUS)..."

        # Test framework libraries (from platform artifacts)
        publish_app "$(find "$APPS_DIR/testframework/testlibraries/any" -name '*.app' | head -1)" "Any"
        publish_app "$(find "$APPS_DIR/testframework/testlibraries/assert" -name '*.app' | head -1)" "Library Assert"
        publish_app "$(find "$APPS_DIR/testframework/testlibraries/variable storage" -name '*.app' | head -1)" "Library Variable Storage"
        publish_app "$(find "$APPS_DIR/testframework/testlibraries/permissions mock" -name '*.app' | head -1)" "Permissions Mock"

        # MS Test Runner (codeunits 130450-130456)
        publish_app "$(find "$APPS_DIR/testframework/TestRunner" -name '*.app' | head -1)" "Test Runner (MS)"

        # System Application Test Library and Tests (pre-compiled from platform artifacts)
        publish_app "$(find "$APPS_DIR/System Application/Test" -name '*Test Library*' | head -1)" "System App Test Library"
        publish_app "$(find "$APPS_DIR/System Application/Test" -name '*System Application Test.app' | head -1)" "System App Test"

        # Our custom TestRunner extension (wraps MS Test Framework with API)
        publish_app "aldirectcompile/TestRunnerExtension/TestRunner.app" "TestRunner Extension"

        STEP_END=$(date +%s.%N)
        echo "PUBLISH_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Initialize demo data
      run: |
        STEP_START=$(date +%s.%N)
        AUTH="admin:Admin123!"
        ODATA="http://localhost:7048/$INSTANCE"

        # Get company ID
        COMPANY_ID=$(curl -sf --max-time 10 -u "$AUTH" \
          "$ODATA/ODataV4/Company" | \
          python3 -c "import sys,json; print(json.load(sys.stdin)['value'][0]['Id'])")
        echo "COMPANY_ID=$COMPANY_ID" >> $GITHUB_ENV
        API="http://localhost:7052/$INSTANCE/api/custom/automation/v1.0/companies($COMPANY_ID)/codeunitRunRequests"

        # Wait for custom API
        for i in $(seq 1 24); do
          RESP=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 5 -u "$AUTH" "$API" 2>/dev/null)
          [ "$RESP" = "200" ] && { echo "Custom API ready"; break; }
          echo "  Waiting for API... (HTTP $RESP)"
          sleep 5
        done

        # Run demo data initialization codeunits (matches BCApps ImportTestDataInBcContainer.ps1)
        run_cu() {
          local id=$1 name=$2
          printf "  CU %-6s %-35s " "$id" "$name..."
          RESP=$(curl -sf --max-time 15 -u "$AUTH" -X POST \
            -H "Content-Type: application/json" -d "{\"codeunitId\": $id}" "$API" 2>/dev/null)
          REQ_ID=$(echo "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin).get('Id',''))" 2>/dev/null)
          [ -z "$REQ_ID" ] && { echo "FAILED (create)"; return 1; }
          curl -sf -o /dev/null --max-time 300 -u "$AUTH" -X POST \
            -H "Content-Type: application/json" "$API($REQ_ID)/Microsoft.NAV.runCodeunit" 2>/dev/null || true
          RESULT=$(curl -sf --max-time 10 -u "$AUTH" "$API($REQ_ID)" | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('LastResult','Unknown'))" 2>/dev/null)
          echo "$RESULT"
        }

        echo "Initializing demo data..."
        run_cu 2    "Company Initialize"
        run_cu 5193 "Contoso Demo Data (OnRun)"
        run_cu 5691 "Contoso Finish"

        STEP_END=$(date +%s.%N)
        echo "DEMODATA_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Extract test codeunit IDs
      run: |
        # Find all test codeunit IDs (Subtype = Test) from BCApps source
        grep -r "Subtype = Test" bcapps-temp/src/System\ Application/Test/ --include="*.al" -l | while read f; do
            grep -oP "^codeunit \K\d+" "$f"
        done | sort -n > test-codeunit-ids.txt
        echo "Found $(wc -l < test-codeunit-ids.txt) test codeunits"
        cat test-codeunit-ids.txt

    - name: Run System Application Tests
      run: |
        STEP_START=$(date +%s.%N)
        AUTH="admin:Admin123!"
        API="http://localhost:7052/$INSTANCE/api/custom/automation/v1.0/companies($COMPANY_ID)/codeunitRunRequests"

        # MS-disabled codeunits (method="*" in BCApps DisabledTests/*.json)
        MS_DISABLED=" 132517 132928 135016 135018 139146 "

        # Per-test timeout (seconds)
        TEST_TIMEOUT=120

        PASSED=0; FAILED=0; ERRORS=0; SKIPPED=0; TIMEOUTS=0; TOTAL=0
        FAILED_CUS=""
        TIMEOUT_CUS=""

        while read CU_ID; do
          TOTAL=$((TOTAL + 1))

          # Skip MS-disabled codeunits
          if echo "$MS_DISABLED" | grep -q " $CU_ID "; then
            SKIPPED=$((SKIPPED + 1))
            continue
          fi

          # Run test with timeout (kills hung tests)
          RESULT=$(timeout $TEST_TIMEOUT bash -c "
            RESP=\$(curl -sf --max-time 15 -u '$AUTH' -X POST \
              -H 'Content-Type: application/json' -d '{\"codeunitId\": $CU_ID}' \
              '$API' 2>/dev/null) || { echo 'CREATE_FAILED'; exit 0; }
            ID=\$(echo \"\$RESP\" | python3 -c \"import json,sys; print(json.load(sys.stdin).get('Id',''))\" 2>/dev/null)
            [ -z \"\$ID\" ] && { echo 'CREATE_FAILED'; exit 0; }
            curl -sf -o /dev/null --max-time $((TEST_TIMEOUT - 10)) -u '$AUTH' -X POST \
              -H 'Content-Type: application/json' \
              '$API('\$ID')/Microsoft.NAV.runCodeunit' 2>/dev/null || true
            curl -sf --max-time 10 -u '$AUTH' '$API('\$ID')' 2>/dev/null | \
              python3 -c \"import json,sys; d=json.load(sys.stdin); print(d.get('LastResult','Unknown'))\" 2>/dev/null || echo 'Unknown'
          " 2>/dev/null) || RESULT=""

          if [ -z "$RESULT" ] || [ "$RESULT" = "" ]; then
            TIMEOUTS=$((TIMEOUTS + 1))
            TIMEOUT_CUS="$TIMEOUT_CUS $CU_ID"
            echo "  TMOUT CU $CU_ID (${TEST_TIMEOUT}s)"
          elif [ "$RESULT" = "CREATE_FAILED" ]; then
            ERRORS=$((ERRORS + 1))
            echo "  ERR   CU $CU_ID: create failed"
          elif [ "$RESULT" = "Success" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            FAILED_CUS="$FAILED_CUS $CU_ID"
            echo "  FAIL  CU $CU_ID: $RESULT"
          fi

          # Progress every 25 codeunits
          [ $((TOTAL % 25)) -eq 0 ] && echo "--- Progress: $TOTAL codeunits (pass=$PASSED fail=$FAILED skip=$SKIPPED tmout=$TIMEOUTS err=$ERRORS) ---"
        done < test-codeunit-ids.txt

        EFF=$((PASSED + FAILED))
        RATE=0; [ $EFF -gt 0 ] && RATE=$(python3 -c "print(round($PASSED/$EFF*100,1))")

        echo ""
        echo "========================================="
        echo "SYSTEM APPLICATION TEST RESULTS"
        echo "========================================="
        echo "Total codeunits: $TOTAL"
        echo "Passed:          $PASSED"
        echo "Failed:          $FAILED"
        echo "MS-Disabled:     $SKIPPED"
        echo "Timeouts:        $TIMEOUTS"
        echo "Errors:          $ERRORS"
        echo "Pass rate:       ${RATE}% (of $EFF executed)"
        echo "========================================="

        echo "TEST_TOTAL=$TOTAL" >> $GITHUB_ENV
        echo "TEST_PASSED=$PASSED" >> $GITHUB_ENV
        echo "TEST_FAILED=$FAILED" >> $GITHUB_ENV
        echo "TEST_SKIPPED=$SKIPPED" >> $GITHUB_ENV
        echo "TEST_TIMEOUTS=$TIMEOUTS" >> $GITHUB_ENV
        echo "TEST_ERRORS=$ERRORS" >> $GITHUB_ENV

        STEP_END=$(date +%s.%N)
        echo "TEST_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

        [ -n "$FAILED_CUS" ] && echo "Failed:$FAILED_CUS"
        [ -n "$TIMEOUT_CUS" ] && echo "Timeouts:$TIMEOUT_CUS"

    - name: Record metrics
      if: always()
      run: |
        TOTAL=$(python3 -c "print(f'{$(date +%s.%N) - ${{ env.START_EPOCH }}:.3f}')")
        echo "=== Pipeline Timing ==="
        echo "Setup (clone + build):  ${SETUP_DURATION:-n/a}s"
        echo "Download artifacts:     ${DOWNLOAD_DURATION:-n/a}s"
        echo "Prepare patches:        ${PATCH_DURATION:-n/a}s"
        echo "BC container start:     ${CONTAINER_DURATION:-n/a}s"
        echo "Publish extensions:     ${PUBLISH_DURATION:-n/a}s"
        echo "Demo data init:         ${DEMODATA_DURATION:-n/a}s"
        echo "Run tests:              ${TEST_DURATION:-n/a}s"
        echo "Total:                  ${TOTAL}s"
        echo ""
        echo "=== Test Results ==="
        echo "Codeunits total:    ${TEST_TOTAL:-n/a}"
        echo "Codeunits passed:   ${TEST_PASSED:-n/a}"
        echo "Codeunits failed:   ${TEST_FAILED:-n/a}"
        echo "Codeunits disabled: ${TEST_SKIPPED:-n/a}"
        echo "Codeunits timeout:  ${TEST_TIMEOUTS:-n/a}"
        echo "Codeunits errors:   ${TEST_ERRORS:-n/a}"
