name: Parallel System App Tests (Linux)

on:
  workflow_dispatch:
    inputs:
      bc_version:
        description: 'BC version (e.g. 27.5.46862.48004)'
        required: false
        default: '27.5.46862.48004'
        type: string
      runners:
        description: 'Number of parallel runners (0 = one per codeunit)'
        required: false
        default: '0'
        type: string

env:
  BC_VERSION: ${{ inputs.bc_version || '27.5.46862.48004' }}
  AL_TOOLS_VERSION: '16.2.28.57946'
  BCAPPS_TAG: 'releases/27.5/StrictMode'
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/bc-parallel  # note: lowercased in snapshot step

permissions:
  packages: write
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      bc-image: ${{ steps.snapshot.outputs.bc-image }}
      sql-image: ${{ steps.snapshot.outputs.sql-image }}
      matrix: ${{ steps.split.outputs.matrix }}
      num-codeunits: ${{ steps.split.outputs.num-codeunits }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Record start time
      run: echo "START_EPOCH=$(date +%s.%N)" >> $GITHUB_ENV

    - name: Setup .NET and AL tools
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install AL compiler
      run: |
        dotnet tool install -g Microsoft.Dynamics.BusinessCentral.Development.Tools.Linux \
          --version ${{ env.AL_TOOLS_VERSION }} || true
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Clone BCApps and bc-linux
      run: |
        STEP_START=$(date +%s.%N)
        git clone --depth 1 --branch ${{ env.BCAPPS_TAG }} --single-branch \
          https://github.com/microsoft/BCApps bcapps-temp &
        BCAPPS_PID=$!
        git clone --depth 1 https://github.com/StefanMaron/MsDyn365Bc.On.Linux.git bc-linux
        wait $BCAPPS_PID
        STEP_END=$(date +%s.%N)
        echo "SETUP_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Bump app versions to 27.6
      run: |
        find bcapps-temp/src/System\ Application -name "app.json" | while read f; do
          python3 -c "
        import json, re
        with open('$f', 'r') as fh:
            data = json.loads(fh.read())
        if 'version' in data:
            data['version'] = re.sub(r'^27\.5\.', '27.6.', data['version'])
        with open('$f', 'w') as fh:
            json.dump(data, fh, indent=2)
            fh.write('\n')
        "
        done

    - name: Start BC container (docker-compose)
      run: |
        STEP_START=$(date +%s.%N)
        cd bc-linux
        printf "BC_VERSION=${{ env.BC_VERSION }}\nSA_PASSWORD=Passw0rd123!\nBC_CLEAR_ALL_APPS=true\nBC_SKIP_APP_PUBLISH=true\n" > .env
        docker compose up -d --build 2>&1 | tail -10

        echo "Waiting for BC to be healthy..."
        for i in $(seq 1 360); do
          STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q bc) 2>/dev/null || echo "unknown")
          case "$STATUS" in
            healthy) echo "BC healthy after $((i*5))s"; break ;;
            unhealthy) echo "ERROR: unhealthy"; docker compose logs bc 2>&1 | tail -50; exit 1 ;;
          esac
          if ! docker compose ps bc 2>/dev/null | grep -q "Up"; then
            echo "ERROR: BC container died"; docker compose logs bc 2>&1 | tail -50; exit 1
          fi
          [ $((i % 12)) -eq 0 ] && echo "  $((i*5))s: $(docker compose logs bc 2>&1 | grep '\[entrypoint\]' | tail -1)"
          sleep 5
        done

        echo "INSTANCE=BC" >> $GITHUB_ENV
        echo "BC_CONTAINER=$(docker compose ps -q bc)" >> $GITHUB_ENV
        echo "SQL_CONTAINER=$(docker compose ps -q sql)" >> $GITHUB_ENV
        cd ..
        docker cp "$(cd bc-linux && docker compose ps -q bc):/bc/artifacts" bc-artifacts
        STEP_END=$(date +%s.%N)
        echo "CONTAINER_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Prepare symbols and dependencies
      run: |
        STEP_START=$(date +%s.%N)
        mkdir -p .alpackages mock-assemblies service-dlls

        find bc-artifacts/app/Extensions -name "*.app" -exec cp {} .alpackages/ \;
        SYSTEM_APP=$(find bc-artifacts/platform/ModernDev -name "System.app" 2>/dev/null | head -1)
        [ -n "$SYSTEM_APP" ] && cp "$SYSTEM_APP" .alpackages/System.app
        find bc-artifacts/platform -path "*testframework*" -name "*.app" -exec cp {} .alpackages/ \; 2>/dev/null
        find bc-artifacts/platform -path "*/Test/*.app" -exec cp {} .alpackages/ \; 2>/dev/null

        find bc-artifacts/platform -path "*Mock Assemblies*" -name "*.dll" -exec cp {} mock-assemblies/ \; 2>/dev/null

        SVC_DIR=$(find bc-artifacts/platform/ServiceTier -name "Microsoft.Dynamics.Nav.Server.dll" -printf "%h\n" 2>/dev/null | head -1)
        if [ -n "$SVC_DIR" ]; then
          find "$SVC_DIR" -name "*.dll" | while read f; do
            case "$(basename "$f")" in System.*) ;; *) cp -n "$f" service-dlls/ 2>/dev/null ;; esac
          done
          for dll in System.Drawing.Common.dll System.IdentityModel.Tokens.Jwt.dll System.Private.ServiceModel.dll; do
            find "$SVC_DIR" -name "$dll" 2>/dev/null | head -1 | xargs -I{} cp {} service-dlls/ 2>/dev/null
          done
          SYSDRAWING=$(find bc-artifacts/platform -path "*/WebClient/*/refs/System.Drawing.dll" 2>/dev/null | head -1)
          [ -n "$SYSDRAWING" ] && cp "$SYSDRAWING" service-dlls/
          find bc-artifacts/platform -path "*Test Assemblies*" -name "*.dll" -exec cp -n {} service-dlls/ \; 2>/dev/null
          find bc-artifacts/platform -path "*Mock Assemblies*" -name "*.dll" -exec cp -n {} service-dlls/ \; 2>/dev/null
        fi

        dotnet build bc-linux/src/stubs/DrawingStub -c Release 2>&1 | tail -3
        DRAWING_STUB=$(find bc-linux/src/stubs/DrawingStub -path "*/Release/*/System.Drawing.Common.dll" 2>/dev/null | head -1)
        [ -n "$DRAWING_STUB" ] && cp "$DRAWING_STUB" service-dlls/System.Drawing.Common.dll

        sed -i '/assembly("System.ServiceModel.Primitives")/,/^    }/{s/^/\/\//}' \
          "bcapps-temp/src/System Application/App/DotNet Aliases/src/dotnet.al" 2>/dev/null
        sed -i 's/assembly("System.Drawing")/assembly("System.Drawing.Common")/' \
          "bcapps-temp/src/System Application/App/DotNet Aliases/src/dotnet.al" 2>/dev/null

        REF_DIR=$(find "$DOTNET_ROOT/packs/Microsoft.NETCore.App.Ref" /usr/share/dotnet/packs/Microsoft.NETCore.App.Ref \
          -maxdepth 3 -type d -name "net8.0" 2>/dev/null | head -1)
        echo "PROBING_PATHS=$REF_DIR,$(pwd)/service-dlls,$(pwd)/mock-assemblies" >> $GITHUB_ENV

        find bcapps-temp/src/System\ Application -name "*.al" \
          -exec sed -i '/^\s*\(Scripts\|StartupScript\|RefreshScript\|RecreateScript\|StyleSheets\)\s*=/s|\\|/|g' {} \; 2>/dev/null

        STEP_END=$(date +%s.%N)
        echo "PREPARE_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Compile System Application
      env:
        DOTNET_ReadyToRun: '0'
        COMPlus_ReadyToRun: '0'
      run: |
        AL compile \
          "/project:bcapps-temp/src/System Application/App" \
          "/packagecachepath:$(pwd)/.alpackages" \
          "/assemblyProbingPaths:$PROBING_PATHS" \
          || { echo "ERROR: compilation failed"; exit 1; }
        find "bcapps-temp/src/System Application/App" -maxdepth 1 -name "*.app" -exec cp {} .alpackages/ \;
        find "bcapps-temp/src/System Application/App" -maxdepth 1 -name "*.app" -exec cp {} . \;

    - name: Compile System Application Test Library
      env:
        DOTNET_ReadyToRun: '0'
        COMPlus_ReadyToRun: '0'
      run: |
        AL compile \
          "/project:bcapps-temp/src/System Application/Test Library" \
          "/packagecachepath:$(pwd)/.alpackages" \
          "/assemblyProbingPaths:$PROBING_PATHS" \
          || echo "WARNING: Test Library compilation failed"
        find "bcapps-temp/src/System Application/Test Library" -maxdepth 1 -name "*.app" -exec cp {} .alpackages/ \; 2>/dev/null
        find "bcapps-temp/src/System Application/Test Library" -maxdepth 1 -name "*.app" -exec cp {} . \; 2>/dev/null

    - name: Compile System Application Test
      env:
        DOTNET_ReadyToRun: '0'
        COMPlus_ReadyToRun: '0'
      run: |
        AL compile \
          "/project:bcapps-temp/src/System Application/Test" \
          "/packagecachepath:$(pwd)/.alpackages" \
          "/assemblyProbingPaths:$PROBING_PATHS" \
          || { echo "ERROR: compilation failed"; exit 1; }
        find "bcapps-temp/src/System Application/Test" -maxdepth 1 -name "*.app" -exec cp {} . \;

    - name: Publish extensions to BC
      run: |
        STEP_START=$(date +%s.%N)
        DEV="http://localhost:7049/$INSTANCE/dev/apps?SchemaUpdateMode=forcesync"
        AUTH="admin:Admin123!"

        publish_app() {
          local FILE="$1" NAME="$2"
          RESP=$(curl -s -w "\n%{http_code}" --max-time 180 \
            -u "$AUTH" -X POST \
            -F "file=@$FILE;type=application/octet-stream" "$DEV")
          HTTP=$(echo "$RESP" | tail -1)
          echo "  $NAME: HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "$RESP" | head -1 | python3 -c "import json,sys; print(json.load(sys.stdin).get('Message','')[:500])" 2>/dev/null || true
            echo "FATAL: Failed to publish $NAME — aborting"
            exit 1
          fi
        }

        SYSAPP=$(find . -maxdepth 1 -name "*System*Application*.app" ! -name "*Test*" | head -1)
        publish_app "$SYSAPP" "System Application"

        echo "Publishing test framework apps..."
        find bc-artifacts -name "*.app" -type f \( \
            -name "Microsoft_Test Runner_*" -o \
            -name "Microsoft_Library Assert_*" -o \
            -name "Microsoft_Library Variable Storage_*" -o \
            -name "Microsoft_Permissions Mock_*" -o \
            -name "Microsoft_Any_*" \
        \) 2>/dev/null | sort | while read -r app; do
          NAME=$(basename "$app")
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 \
            -u "$AUTH" -X POST \
            -F "file=@$app;type=application/octet-stream" "$DEV" 2>/dev/null)
          echo "  $NAME: HTTP $HTTP"
        done || true

        publish_app "bc-linux/extensions/TestRunnerExtension/TestRunnerExtension.app" "TestRunnerExtension"

        TESTLIB=$(find . -maxdepth 1 -name "*Test*Library*.app" | head -1)
        [ -n "$TESTLIB" ] && publish_app "$TESTLIB" "Test Library"
        TESTAPP=$(find . -maxdepth 1 -name "*System*Application*Test*.app" ! -name "*Library*" | head -1)
        [ -n "$TESTAPP" ] && publish_app "$TESTAPP" "System Application Test"

        STEP_END=$(date +%s.%N)
        echo "PUBLISH_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Initialize demo data
      run: |
        chmod +x bc-linux/scripts/run-tests.sh
        for CU_ID in 2 5193 5691; do
          echo -n "  Initializing CU $CU_ID... "
          bc-linux/scripts/run-tests.sh --codeunit-range "$CU_ID" --timeout 5 > /dev/null 2>&1 && echo "OK" || echo "WARN"
        done

    - name: Snapshot containers and push to ghcr.io
      id: snapshot
      run: |
        STEP_START=$(date +%s.%N)
        # Docker requires lowercase image names
        PREFIX=$(echo "${IMAGE_PREFIX}" | tr '[:upper:]' '[:lower:]')
        BC_IMG="${PREFIX}-bc:run-${{ github.run_id }}"
        SQL_IMG="${PREFIX}-sql:run-${{ github.run_id }}"

        echo "Committing BC container..."
        docker commit "$BC_CONTAINER" "$BC_IMG"
        echo "Committing SQL container..."
        docker commit "$SQL_CONTAINER" "$SQL_IMG"

        echo "BC image: $(docker images "$BC_IMG" --format '{{.Size}}')"
        echo "SQL image: $(docker images "$SQL_IMG" --format '{{.Size}}')"

        echo "Pushing to ghcr.io..."
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        docker push "$BC_IMG" &
        BC_PUSH_PID=$!
        docker push "$SQL_IMG" &
        SQL_PUSH_PID=$!
        wait $BC_PUSH_PID || { echo "ERROR: BC push failed"; exit 1; }
        wait $SQL_PUSH_PID || { echo "ERROR: SQL push failed"; exit 1; }
        echo "Push complete."

        echo "bc-image=$BC_IMG" >> "$GITHUB_OUTPUT"
        echo "sql-image=$SQL_IMG" >> "$GITHUB_OUTPUT"

        STEP_END=$(date +%s.%N)
        echo "SNAPSHOT_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Discover test codeunits and build matrix
      id: split
      run: |
        TESTAPP=$(find . -maxdepth 1 -name "*System*Application*Test*.app" ! -name "*Library*" | head -1)
        CODEUNIT_IDS=$(unzip -p "$TESTAPP" SymbolReference.json 2>/dev/null | python3 -c "
        import sys, json
        raw = sys.stdin.read()
        data = json.loads(raw.lstrip('\ufeff'))
        ids = []
        def collect(node):
            for cu in node.get('Codeunits', []):
                props = {p['Name']: p['Value'] for p in cu.get('Properties', [])}
                if props.get('Subtype') == 'Test':
                    ids.append(str(cu['Id']))
            for ns in node.get('Namespaces', []):
                collect(ns)
        collect(data)
        print(','.join(ids))
        ")
        echo "Found $(echo "$CODEUNIT_IDS" | tr ',' '\n' | wc -l) test codeunits"

        RUNNERS="${{ inputs.runners || '0' }}"
        python3 -c "
        import json, math
        ids = '$CODEUNIT_IDS'.split(',')
        n = int('$RUNNERS')
        if n == 0:
            matrix = {'include': [{'batch': i, 'codeunit_ids': cid} for i, cid in enumerate(ids)]}
        else:
            batch_size = math.ceil(len(ids) / n)
            batches = [ids[i:i+batch_size] for i in range(0, len(ids), batch_size)]
            matrix = {'include': [{'batch': i, 'codeunit_ids': ','.join(b)} for i, b in enumerate(batches)]}
        with open('matrix.json', 'w') as f:
            json.dump(matrix, f)
        print(f'Matrix: {len(matrix[\"include\"])} jobs')
        "
        echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"
        echo "num-codeunits=$(echo "$CODEUNIT_IDS" | tr ',' '\n' | wc -l)" >> "$GITHUB_OUTPUT"

    - name: Upload disabled tests
      uses: actions/upload-artifact@v4
      with:
        name: disabled-tests
        path: bcapps-temp/src/System Application/Test/DisabledTests/
        if-no-files-found: ignore

    - name: Record prepare metrics
      if: always()
      run: |
        TOTAL=$(python3 -c "print(f'{$(date +%s.%N) - ${{ env.START_EPOCH }}:.3f}')")
        echo "=== Prepare Timing ==="
        echo "Setup (clone repos):    ${SETUP_DURATION:-n/a}s"
        echo "BC container start:     ${CONTAINER_DURATION:-n/a}s"
        echo "Prepare symbols:        ${PREPARE_DURATION:-n/a}s"
        echo "Publish extensions:     ${PUBLISH_DURATION:-n/a}s"
        echo "Snapshot + push:        ${SNAPSHOT_DURATION:-n/a}s"
        echo "Total:                  ${TOTAL}s"

  # ============================================================
  # TEST: Pull snapshot, start BC+SQL, run one codeunit
  # ============================================================
  test:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 256
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
    - name: Record start time
      run: echo "TEST_START=$(date +%s.%N)" >> $GITHUB_ENV

    - name: Pull snapshot images
      run: |
        STEP_START=$(date +%s.%N)
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        docker pull ${{ needs.prepare.outputs.sql-image }} &
        docker pull ${{ needs.prepare.outputs.bc-image }} &
        wait
        STEP_END=$(date +%s.%N)
        echo "PULL_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Start BC+SQL from snapshots
      run: |
        STEP_START=$(date +%s.%N)

        # Create network so BC can reach SQL at hostname "sql"
        docker network create bc-net

        # Start SQL from committed image
        docker run -d --name sql --network bc-net \
          -e ACCEPT_EULA=Y \
          -e "MSSQL_SA_PASSWORD=Passw0rd123!" \
          ${{ needs.prepare.outputs.sql-image }}

        echo "Waiting for SQL..."
        for i in $(seq 1 20); do
          docker exec sql /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "Passw0rd123!" -C -No -Q "SELECT 1" &>/dev/null \
            && echo "SQL ready after $((i*3))s" && break
          sleep 3
        done

        # Start BC from committed image
        # The entrypoint is idempotent — skips completed phases
        # BC_SKIP_APP_PUBLISH=true, BC_CLEAR_ALL_APPS not set → fast restart
        docker run -d --name bc --network bc-net \
          -e SQL_SERVER=sql \
          -e SA_PASSWORD="Passw0rd123!" \
          -e BC_SKIP_APP_PUBLISH=true \
          -p 7048:7048 -p 7049:7049 -p 7052:7052 -p 7085:7085 \
          ${{ needs.prepare.outputs.bc-image }}

        echo "Waiting for BC..."
        for i in $(seq 1 120); do
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" -u admin:Admin123! \
            http://localhost:7048/BC/ODataV4/Company 2>/dev/null || echo "000")
          if [ "$HTTP" = "200" ]; then
            echo "BC healthy after $((i*5))s"
            break
          fi
          [ $((i % 12)) -eq 0 ] && echo "  $((i*5))s: waiting..."
          sleep 5
        done

        if [ "$HTTP" != "200" ]; then
          echo "ERROR: BC not responding"
          docker logs bc 2>&1 | tail -50
          exit 1
        fi

        STEP_END=$(date +%s.%N)
        echo "STARTUP_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Clone bc-linux (for test runner)
      run: |
        git clone --depth 1 https://github.com/StefanMaron/MsDyn365Bc.On.Linux.git bc-linux
        chmod +x bc-linux/scripts/run-tests.sh

    - name: Download disabled tests
      uses: actions/download-artifact@v4
      with:
        name: disabled-tests
        path: DisabledTests
      continue-on-error: true

    - name: Wait for TestRunner API
      run: |
        # The committed image has extensions installed, but the restarted BC
        # process needs time to compile and load them. Wait for the TestRunner
        # API to be available before running tests.
        echo "Waiting for TestRunner API..."
        AUTH="admin:Admin123!"
        COMPANY_ID=$(curl -sf --max-time 10 -u "$AUTH" \
          "http://localhost:7052/BC/api/v2.0/companies" 2>/dev/null \
          | python3 -c "import sys,json; print(json.load(sys.stdin)['value'][0]['id'])" 2>/dev/null || echo "")
        API_BASE="http://localhost:7052/BC/api/custom/automation/v1.0/companies(${COMPANY_ID})"

        for i in $(seq 1 60); do
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" -u "$AUTH" \
            "${API_BASE}/codeunitRunRequests" 2>/dev/null || echo "000")
          if [ "$HTTP" = "200" ]; then
            echo "TestRunner API ready after $((i*5))s"
            break
          fi
          [ $((i % 6)) -eq 0 ] && echo "  $((i*5))s: HTTP $HTTP"
          sleep 5
        done

        if [ "$HTTP" != "200" ]; then
          echo "ERROR: TestRunner API not available after 5 minutes"
          exit 1
        fi

    - name: Run test codeunits
      run: |
        STEP_START=$(date +%s.%N)
        echo "Running codeunits: ${{ matrix.codeunit_ids }}"
        DISABLED_ARG=""
        [ -d "DisabledTests" ] && [ "$(ls DisabledTests/*.json 2>/dev/null | wc -l)" -gt 0 ] \
          && DISABLED_ARG="--disabled-tests DisabledTests"

        bc-linux/scripts/run-tests.sh \
          --codeunit-range "${{ matrix.codeunit_ids }}" \
          --timeout 15 \
          $DISABLED_ARG \
          || true

        STEP_END=$(date +%s.%N)
        echo "RUN_DURATION=$(python3 -c "print(f'{$STEP_END - $STEP_START:.3f}')")" >> $GITHUB_ENV

    - name: Record test metrics
      if: always()
      run: |
        TOTAL=$(python3 -c "print(f'{$(date +%s.%N) - ${{ env.TEST_START }}:.3f}')")
        echo "=== Test Runner ${{ matrix.batch }} ==="
        echo "Pull images:     ${PULL_DURATION:-n/a}s"
        echo "BC+SQL startup:  ${STARTUP_DURATION:-n/a}s"
        echo "Run tests:       ${RUN_DURATION:-n/a}s"
        echo "Total:           ${TOTAL}s"

  # ============================================================
  # COLLECT
  # ============================================================
  collect:
    needs: [prepare, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Summary
      run: |
        echo "=== Parallel Test Execution Summary ==="
        echo "Codeunits: ${{ needs.prepare.outputs.num-codeunits }}"
        echo "Parallel jobs: $(echo '${{ needs.prepare.outputs.matrix }}' | python3 -c 'import json,sys; print(len(json.load(sys.stdin)["include"]))')"
        echo ""
        echo "Check individual test job logs for pass/fail details."
